<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Current Affairs · 100 Questions Drill</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Andika:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Orbitron:wght@500&family=Syne:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');

:root {
  --bg:           #0d0f14;
  --surface:      #13161e;
  --surface2:     #1a1e2a;
  --border:       #242836;
  --gold:         #f5c842;
  --gold-dim:     #c9a230;
  --gold-glow:    rgba(245,200,66,0.08);
  --text:         #e8e6df;
  --muted:        #8a8a9a;
  --accent-blue:  #5b8dee;
  --accent-green: #4caf7d;
  --accent-red:   #e05c5c;
  --accent-purple:#9b72cf;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Andika', sans-serif;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 60px;
}

h1, h2, h3, h4, .syne { font-family: 'Syne', sans-serif; }
.mono { font-family: 'IBM Plex Mono', monospace; }

/* TOPBAR */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
}

.topbar-left { display: flex; align-items: center; gap: 16px; }

.tnpsc-badge {
  background: var(--gold-glow);
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 4px 10px;
  border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.topbar-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  color: var(--muted);
}

.topbar-date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: var(--gold-dim);
}

/* HERO SECTION */
.hero {
  padding: 64px 24px 32px;
  position: relative;
  overflow: hidden;
  max-width: 1100px;
  margin: 0 auto;
}

.hero::after {
  content: '';
  position: absolute;
  top: -50px;
  right: -50px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, var(--gold-glow) 0%, rgba(13,15,20,0) 70%);
  border-radius: 50%;
  pointer-events: none;
}

.hero h1 {
  font-family: 'Syne', sans-serif;
  font-size: 42px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 24px;
  line-height: 1.2;
}

.tag-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}

.tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}

/* NAVIGATION PILLS */
nav.anchor-nav {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 12px;
  scrollbar-width: none;
}
nav.anchor-nav::-webkit-scrollbar { display: none; }

.nav-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  background: transparent;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s ease;
}

.nav-pill:hover, .nav-pill.active {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-glow);
}

/* STATS BAR */
.stats-bar {
  max-width: 1100px;
  margin: 0 auto 32px;
  padding: 0 24px;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--gold-glow);
  padding: 12px 20px;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  border-left: 3px solid var(--gold);
}

.stat-val { font-family: 'IBM Plex Mono', monospace; font-size: 18px; color: #fff; font-weight: 600; }
.stat-lbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; }

/* QUESTION GRID */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 64px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.card-wrapper {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 24px;
  border-left: 4px solid var(--gold);
  position: relative;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
}

.q-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 0.05em;
}

.tag-wrap { display: flex; gap: 8px; align-items: center; }

.cat-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  text-transform: uppercase;
}
.diff-dot { width: 8px; height: 8px; border-radius: 50%; }
.diff-Easy { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
.diff-Medium { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
.diff-Hard { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); }

.mcq-q {
  font-family: 'Andika', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 16px;
}

.stmt-intro {
  font-family: 'Andika', sans-serif;
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 12px;
  font-style: italic;
}

ul.stmt-list { list-style: none; padding: 0; margin-bottom: 16px; }
ul.stmt-list li {
  font-family: 'Andika', sans-serif;
  font-size: 14px;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
}
ul.stmt-list li::before {
  content: attr(data-n) '.';
  font-family: 'IBM Plex Mono', monospace;
  color: var(--gold);
}

ul.mcq-options { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 8px; }
ul.mcq-options li {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid transparent;
  padding: 10px 14px;
  border-radius: 4px;
  display: flex;
  align-items: baseline;
  gap: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
}

ul.mcq-options li:hover:not(.locked) { border-color: var(--gold); background: rgba(255,255,255,0.03); }

ul.mcq-options li.selected { border-left-color: var(--gold); background: var(--gold-glow); }
ul.mcq-options li.correct-ans { border-left-color: var(--accent-green); background: rgba(76,175,125,0.08); border-color: rgba(76,175,125,0.3); }
ul.mcq-options li.wrong-ans { border-left-color: var(--accent-red); background: rgba(224,92,92,0.08); border-color: rgba(224,92,92,0.3); }
ul.mcq-options li.locked { cursor: default; }

.opt-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--muted); }
.opt-text { font-family: 'Andika', sans-serif; font-size: 14px; color: var(--text); }

.toggle-btn {
  border-radius: 20px;
  border: 1.5px solid var(--gold);
  background: transparent;
  color: var(--gold);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 18px;
  margin-top: 16px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.toggle-btn:hover { background: rgba(245,200,66,0.08); }
.toggle-icon { display: inline-block; transition: transform 0.3s ease; }
.toggle-btn.open .toggle-icon { transform: rotate(180deg); }

.q-body {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, opacity 0.25s ease;
  margin-top: 0;
}
.q-body.open {
  margin-top: 16px;
  padding: 14px 16px;
  background: var(--surface2);
  border-left: 3px solid var(--gold);
  border-radius: 4px;
}

.mcq-answer { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent-green); letter-spacing: 0.08em; display: block; margin-bottom: 12px; font-weight: 600;}
.stmt-verdicts { font-family: 'IBM Plex Mono', monospace; font-size: 12px; margin-bottom: 12px; line-height: 1.6; }
.stmt-verdicts .v-cor { color: var(--accent-green); }
.stmt-verdicts .v-inc { color: var(--accent-red); }

.mcq-explain { font-family: 'Andika', sans-serif; font-size: 14px; color: var(--text); line-height: 1.8; margin-bottom: 12px;}
.tip-box { font-family: 'IBM Plex Mono', monospace; font-size: 12px; border-left: 2px solid var(--gold); padding: 8px 12px; background: var(--gold-glow); color: var(--gold); margin-top: 12px; }

/* PROGRESS BAR */
#progress-container {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: var(--surface);
  border-top: 1px solid var(--gold);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
}
#progress-text { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--gold); }
#progress-track { flex: 1; height: 6px; background: var(--border); margin-left: 24px; border-radius: 3px; overflow: hidden; }
#progress-fill { height: 100%; width: 0%; background: var(--gold); transition: width 0.3s ease; }

footer { display: none; } /* Replaced by sticky progress bar */

@media (max-width: 680px) {
  .hero h1 { font-size: 32px; }
  .topbar-title { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="topbar-left">
    <div class="tnpsc-badge">TNPSC Group 1</div>
    <div class="topbar-title mono">Monthly Current Affairs · 100 Questions Drill</div>
  </div>
  <div class="topbar-date mono">April 2026</div>
</header>

<section class="hero">
  <h1>April 2026 Current Affairs<br>100 MCQ Drill</h1>
  <div class="tag-row">
    <span class="tag">100 Questions</span>
    <span class="tag">Source: Shanju Current Affairs</span>
    <span class="tag">Target: TNPSC/RRB/SSC</span>
  </div>
  <nav class="anchor-nav" id="filter-nav">
    <button class="nav-pill active" data-filter="All">All</button>
    <button class="nav-pill" data-filter="Polity">Polity</button>
    <button class="nav-pill" data-filter="Economy">Economy</button>
    <button class="nav-pill" data-filter="Science">Science</button>
    <button class="nav-pill" data-filter="Environment">Environment</button>
    <button class="nav-pill" data-filter="International">International</button>
    <button class="nav-pill" data-filter="TN Affairs">TN Affairs</button>
    <button class="nav-pill" data-filter="Sports">Sports</button>
    <button class="nav-pill" data-filter="Awards">Awards</button>
    <button class="nav-pill" data-filter="Schemes">Schemes & Days</button>
  </nav>
</section>

<div class="stats-bar">
  <div class="stat-card"><span class="stat-val">100</span><span class="stat-lbl">Total Questions</span></div>
  <div class="stat-card"><span class="stat-val">10</span><span class="stat-lbl">Statement-Type</span></div>
  <div class="stat-card"><span class="stat-val">90</span><span class="stat-lbl">Direct MCQ</span></div>
  <div class="stat-card"><span class="stat-val">14</span><span class="stat-lbl">TN-Specific</span></div>
</div>

<main id="mcq-container"></main>

<div id="progress-container">
  <div id="progress-text">Answered: 0 / 100</div>
  <div id="progress-track"><div id="progress-fill"></div></div>
</div>

<script>
// Data extraction from the 100 MCQs provided in the transcript
const rawData = [
  {q:"2026 ஆம் ஆண்டுக்கான மா அரங்கநாதன் விருதை வென்றவர் யார்?", o:["சுதாமூர்த்தி", "விட்டல்ராவ் மற்றும் அம்ஷன் குமார்", "லக்ஷ்மிகர்", "திவ்யா சிங்"], a:1, c:"Awards", d:"Medium", e:"மா அரங்கநாதன் விருது விட்டல்ராவ் மற்றும் அம்ஷன் குமார் ஆகிய இருவருக்கும் வழங்கப்பட்டுள்ளது.", t:"தமிழ் இலக்கிய பங்களிப்பிற்கான முக்கிய விருதுகளை நினைவில் கொள்க."},
  {q:"கழிவு இல்லா நிலையை நோக்கி 20 நகரங்கள் (Zero Waste 20 Cities) என்ற முன்னெடுப்பில் தேர்ந்தெடுக்கப்பட்ட இந்திய நகரம் எது?", o:["மதுரை", "வர்க்கலா", "கன்னியாகுமரி", "கொச்சி"], a:1, c:"Environment", d:"Easy", e:"கேரளாவில் உள்ள வர்க்கலா (மினி கோவா) நகரம் இந்த திட்டத்தில் தேர்ந்தெடுக்கப்பட்டுள்ளது.", t:"தூய்மை இந்தியா மற்றும் சுற்றுச்சூழல் முன்னெடுப்புகளில் இடங்கள் மிக முக்கியம்."},
  {q:"2025 ஆம் ஆண்டின் மாற்று திறனாளி வில்வித்தை வீராங்கனையாக (Para Archer of the Year) தேர்ந்தெடுக்கப்பட்டவர் யார்?", o:["சீட்டல் தேவி", "பவினா படேல்", "அவனி லேகரா", "தீபா மாலிக்"], a:0, c:"Sports", d:"Medium", e:"சீட்டல் தேவி 2025க்கான சிறந்த மாற்றுத்திறனாளி வில்வித்தை வீராங்கனையாக தேர்வாகியுள்ளார்.", t:"பாரா தடகள விருதுகள் TNPSC தேர்வுகளில் அடிக்கடி கேட்கப்படும்."},
  {q:"சாகித்திய அகாடமி யுவ புரஸ்கார விருது 2025 வென்றவர் யார்?", o:["ராமகிருஷ்ணன்", "லக்ஷ்மிகர்", "சுதாமூர்த்தி", "எம்எம் நரவணி"], a:1, c:"Awards", d:"Hard", e:"2025 ஆம் ஆண்டிற்கான சாகித்திய அகாடமி யுவ புரஸ்கார விருதை லக்ஷ்மிகர் வென்றுள்ளார்.", t:"இளம் எழுத்தாளர்களுக்கான யுவ புரஸ்கார் தேசிய அளவிலான விருது."},
  {q:"கன்ஸ் குறை கடத்தி ஆலை (Semiconductor Plant) எங்கு திறந்து வைக்கப்பட்டது?", o:["தமிழ்நாடு", "மகாராஷ்டிரா", "குஜராத்", "கர்நாடகா"], a:2, c:"Economy", d:"Easy", e:"கன்ஸ் (Kans) செமிகண்டக்டர் ஆலை குஜராத் மாநிலத்தில் சமீபத்தில் திறக்கப்பட்டது.", t:"குறைக்கடத்தி உற்பத்தி இந்தியாவின் தற்போதைய முக்கிய பொருளாதார இலக்கு."},
  {q:"உலக இளைஞர் நாடாளுமன்றத்தில் இந்தியாவின் பிரதிநிதியாக தேர்ந்தெடுக்கப்பட்டவர் யார்?", o:["ஸ்துதி பிரதான்", "மேனக்கா குருசாமி", "ரித்திகா ஸ்ரீ", "திவ்யா சிங்"], a:0, c:"International", d:"Medium", e:"ஸ்துதி பிரதான் உலக இளைஞர் நாடாளுமன்றத்தில் (Global Youth Parliament) இந்தியாவின் பிரதிநிதியாக பங்கேற்றார்.", t:"சர்வதேச அரங்கில் இந்திய பிரதிநிதிகள்."},
  {q:"லக்பதி பிதியா (Lakhpati Didi) யோஜனா திட்டத்தை தொடங்கியுள்ள யூனியன் பிரதேசம்/மாநிலம் எது?", o:["தமிழ்நாடு", "புதுச்சேரி", "டெல்லி", "ஜம்மு காஷ்மீர்"], a:2, c:"Schemes", d:"Medium", e:"டெல்லி யூனியன் பிரதேசம் லக்பதி பிதியா திட்டத்தை அறிமுகப்படுத்தியுள்ளது.", t:"பெண்கள் பொருளாதார மேம்பாட்டு திட்டங்கள் (Women Empowerment)."},
  {q:"இந்திய ராணுவத்தின் துணை தளபதியாக நியமிக்கப்பட்டவர் யார்?", o:["அசோக் குமார் லஹிரி", "தீரஜ் சேத்", "உபேந்திர திவேதி", "ஆர் கே ராகவன்"], a:1, c:"Defence", d:"Hard", e:"தீரஜ் சேத் இந்திய ராணுவத்தின் புதிய துணை தளபதியாக நியமிக்கப்பட்டுள்ளார்.", t:"பாதுகாப்பு துறை நியமனங்கள் Group 1 Prelims-ல் முக்கியம்."},
  {q:"உலகின் சிறந்த விமான நிலையமாக விருது பெற்ற விமான நிலையம் எது?", o:["இந்திரா காந்தி, டெல்லி", "ஹமாத், கத்தார்", "சாங்கி, சிங்கப்பூர்", "டுபாய் சர்வதேச விமான நிலையம்"], a:2, c:"International", d:"Easy", e:"சிங்கப்பூரின் சாங்கி விமான நிலையம் உலகின் சிறந்த விமான நிலையத்திற்கான விருதை தொடர்ந்து பெற்று வருகிறது.", t:"சர்வதேச உள்கட்டமைப்பு தரவரிசைகள்."},
  {q:"'மிஷன் மித்ரா' எதனோடு தொடர்புடையது?", o:["NASA", "DRDO", "ISRO", "CBI"], a:2, c:"Science", d:"Medium", e:"மிஷன் மித்ரா என்பது இந்திய விண்வெளி ஆராய்ச்சி நிறுவனத்தின் (ISRO) ஒரு திட்டமாகும்.", t:"ISRO-வின் புதிய திட்டங்கள் அறிவியல் பகுதியில் கேட்கப்படும்."},
  {q:"'கர்சாதி' (Karsathi) இணையத்தை துவக்கிய அமைப்பு எது?", o:["RBI", "CBDT (Central Board of Direct Taxes)", "NHAI", "NITI Aayog"], a:1, c:"Economy", d:"Hard", e:"மத்திய நேரடி வரிகள் வாரியம் (CBDT) கர்சாதி இணையதளத்தை அறிமுகப்படுத்தியுள்ளது.", t:"வரி மற்றும் நிதி சார்ந்த டிஜிட்டல் முன்னெடுப்புகள்."},
  {q:"'Tides of Time' என்ற புத்தகத்தின் ஆசிரியர் யார்?", o:["ஆர் கே ராகவன்", "சுதாமூர்த்தி", "எம்எம் நரவணி", "அருந்ததி ராய்"], a:1, c:"Awards", d:"Easy", e:"பிரபல எழுத்தாளர் சுதாமூர்த்தி அவர்கள் 'Tides of Time' என்ற புத்தகத்தை எழுதியுள்ளார்.", t:"சமீபத்திய புத்தகங்கள் மற்றும் ஆசிரியர்கள் (Books & Authors)."},
  {q:"2026 கேலோ இந்தியா பழங்குடியின விளையாட்டுப் போட்டிகளில் முதலிடம் பிடித்த மாநிலம் எது?", o:["ஒடிசா", "ஜர்கண்ட்", "கர்நாடகா", "சத்தீஸ்கர்"], a:2, c:"Sports", d:"Medium", e:"கர்நாடகா மாநிலம் 2026 கேலோ இந்தியா பழங்குடியின விளையாட்டுகளில் (Tribal Games) முதலிடத்தை பிடித்தது.", t:"கேலோ இந்தியா விளையாட்டுப் போட்டிகளின் வெற்றியாளர்கள்."},
  {q:"தேசிய கடல்சார் தினம் (National Maritime Day) எப்போது அனுசரிக்கப்படுகிறது?", o:["ஏப்ரல் 1", "ஏப்ரல் 5", "ஏப்ரல் 10", "ஏப்ரல் 15"], a:1, c:"Schemes", d:"Easy", e:"ஏப்ரல் 5 ஆம் தேதி தேசிய கடல்சார் தினம் இந்தியாவில் அனுசரிக்கப்படுகிறது.", t:"முக்கிய தினங்கள் மற்றும் அவற்றின் கருப்பொருள்கள்."},
  {q:"E20 பெட்ரோல் (20% எத்தனால் கலவை) நாடு முழுவதும் எப்போது அறிமுகம் செய்யப்பட்டது?", o:["ஜனவரி 1, 2026", "ஏப்ரல் 1, 2026", "மே 1, 2026", "ஜூன் 1, 2026"], a:1, c:"Environment", d:"Medium", e:"ஏப்ரல் 1, 2026 முதல் E20 பெட்ரோல் (80% பெட்ரோல் + 20% எத்தனால்) நாடு முழுவதும் அமலுக்கு வந்தது.", t:"பசுமை எரிசக்தி மற்றும் கார்பன் குறைப்பு நடவடிக்கைகள்."},
  {q:"நமோ ட்ரோன் திதி (Namo Drone Didi) திட்டத்தில் முதலிடம் பிடித்த மாநிலம் எது?", o:["குஜராத்", "கர்நாடகா", "தமிழ்நாடு", "உத்தர பிரதேசம்"], a:1, c:"Schemes", d:"Medium", e:"கர்நாடகா மாநிலம் நமோ ட்ரோன் திதி திட்டத்தை செயல்படுத்துவதில் முதலிடம் பிடித்துள்ளது.", t:"வேளாண்மையில் ட்ரோன் பயன்பாடு மற்றும் பெண்கள் மேம்பாடு."},
  {q:"அதிவேக இணையத்திற்காக 'ஸ்டார்லிங்க்' (Starlink) நிறுவனத்துடன் ஒப்பந்தம் செய்த மாநிலம் எது?", o:["மகாராஷ்டிரா", "மேகாலயா", "கேரளா", "சிக்கிம்"], a:1, c:"Science", d:"Hard", e:"எலான் மஸ்க்கின் ஸ்டார்லிங்க் நிறுவனத்துடன் மேகாலயா அரசு புரிந்துணர்வு ஒப்பந்தம் செய்துள்ளது.", t:"டிஜிட்டல் உள்கட்டமைப்பு மற்றும் வடகிழக்கு மாநிலங்களின் வளர்ச்சி."},
  {q:"சமீபத்தில் எந்த நாட்டில் தட்டம்மை நோய் (Measles) தீவிர பரவல் ஏற்பட்டது?", o:["இந்தியா", "பாகிஸ்தான்", "வங்காளதேசம்", "இலங்கை"], a:2, c:"International", d:"Medium", e:"வங்காளதேசத்தில் (Bangladesh) சமீபத்தில் தட்டம்மை நோய் பரவல் பெரிய அளவில் ஏற்பட்டது.", t:"அண்டை நாடுகளில் ஏற்படும் முக்கிய சுகாதார நெருக்கடிகள்."},
  {q:"உலக சுகாதார தினம் (World Health Day) எப்போது அனுசரிக்கப்படுகிறது?", o:["ஏப்ரல் 5", "ஏப்ரல் 7", "ஏப்ரல் 10", "ஏப்ரல் 24"], a:1, c:"Schemes", d:"Easy", e:"உலக சுகாதார நிறுவனம் (WHO) தொடங்கப்பட்ட நாளான ஏப்ரல் 7 உலக சுகாதார தினமாக கடைபிடிக்கப்படுகிறது.", t:"WHO தொடர்பான தினங்கள் அடிப்படை பொது அறிவு."},
  {q:"தொற்றா நோய்கள் (Non-Communicable Diseases) அதிகமாக உள்ளதாக அறியப்பட்ட நகரம் எது?", o:["சென்னை", "கோயம்புத்தூர்", "மதுரை", "திருச்சி"], a:2, c:"TN Affairs", d:"Medium", e:"மதுரை நகரில் தொற்றா நோய்களின் பாதிப்பு அதிகமாக உள்ளதாக சமீபத்திய அறிக்கை கூறுகிறது.", t:"தமிழ்நாடு தொடர்பான சுகாதார புள்ளிவிவரங்கள்."},
  {q:"மாநிலங்கள் அவையின் (Rajya Sabha) முதல் மாற்று பாலின நாடாளுமன்ற உறுப்பினர் யார்?", o:["மேனக்கா குருசாமி", "ரித்திகா ஸ்ரீ", "பவானி", "கல்கி சுப்ரமணியம்"], a:0, c:"Polity", d:"Medium", e:"மேனக்கா குருசாமி மாநிலங்கள் அவையின் முதல் திருநங்கை உறுப்பினராக நியமிக்கப்பட்டார்.", t:"சமூக நீதி மற்றும் அரசியல் பிரதிநிதித்துவம்."},
  {q:"ஆர்டிமிஸ் 2 (Artemis 2) மிஷனை அறிமுகப்படுத்திய அமைப்பு எது?", o:["ISRO", "ESA", "NASA", "JAXA"], a:2, c:"Science", d:"Easy", e:"நாசா (NASA) அமைப்பு மனிதர்களை மீண்டும் நிலவுக்கு அனுப்பும் ஆர்டிமிஸ் 2 திட்டத்தை செயல்படுத்துகிறது.", t:"சர்வதேச விண்வெளி திட்டங்கள்."},
  {q:"'A Road Well Travelled' என்ற புத்தகத்தின் ஆசிரியர் யார்?", o:["சுதாமூர்த்தி", "எம்எம் நரவணி", "ஆர் கே ராகவன்", "சசி தரூர்"], a:2, c:"Awards", d:"Hard", e:"முன்னாள் சிபிஐ இயக்குனர் ஆர் கே ராகவன் அவர்கள் இப்புத்தகத்தை எழுதியுள்ளார்.", t:"சுயசரிதைகள் மற்றும் புகழ்பெற்ற நபர்களின் புத்தகங்கள்."},
  {q:"'என் கிராமம் ஆரோக்கிய கிராமம்' என்ற திட்டத்தை அறிமுகப்படுத்திய மாநிலம் எது?", o:["தமிழ்நாடு", "குஜராத்", "மகாராஷ்டிரா", "கர்நாடகா"], a:2, c:"Schemes", d:"Medium", e:"மகாராஷ்டிர மாநிலம் இத்திட்டத்தை கிராமப்புற சுகாதார மேம்பாட்டிற்காக தொடங்கியது.", t:"மாநில அளவிலான சுகாதார திட்டங்கள்."},
  {q:"புதுப்பிக்கத்தக்க ஆற்றல் திறனில் (Renewable Energy Capacity) இந்தியாவின் உலகளாவிய தரவரிசை என்ன?", o:["1", "2", "3", "5"], a:2, c:"Environment", d:"Medium", e:"இந்தியா உலக அளவில் புதுப்பிக்கத்தக்க ஆற்றல் உற்பத்தியில் 3வது இடத்தை பிடித்துள்ளது.", t:"சுற்றுச்சூழல் மற்றும் ஆற்றல் குறியீடுகள்."},
  {q:"உலகின் முதல் 10G நெட்வொர்க்கை கொண்டு வந்த நாடு எது?", o:["அமெரிக்கா", "ஜப்பான்", "தென் கொரியா", "UAE"], a:3, c:"Science", d:"Hard", e:"ஐக்கிய அரபு அமீரகம் (UAE) உலகின் முதல் 10G நெட்வொர்க் வசதியை அறிமுகம் செய்துள்ளது.", t:"தொழில்நுட்ப வளர்ச்சியில் உலக நாடுகள்."},
  {q:"புற்று நோயை 'அறிவிக்கப்பட வேண்டிய நோயாக' (Notifiable Disease) அறிவித்த மாநிலம் எது?", o:["கேரளா", "தமிழ்நாடு", "தெலுங்கானா", "ஆந்திரா"], a:2, c:"Science", d:"Medium", e:"தெலுங்கானா மாநிலம் புற்றுநோயை கட்டாயம் அரசுக்கு தெரிவிக்க வேண்டிய நோயாக அறிவித்துள்ளது.", t:"மாநில அரசுகளின் சுகாதார கொள்கைகள்."},
  {q:"சைக்ளோன் (Cyclone) என்பது இந்தியா மற்றும் எந்த நாட்டிற்கும் இடையான கூட்டு ராணுவப் பயிற்சி?", o:["எகிப்து", "உஸ்பேகிஸ்தான்", "ரஷ்யா", "ஜப்பான்"], a:0, c:"Defence", d:"Easy", e:"சைக்ளோன் என்பது இந்தியா மற்றும் எகிப்து (Egypt) சிறப்பு படைகளுக்கு இடையேயான பயிற்சியாகும்.", t:"ராணுவ பயிற்சிகள் (Military Exercises) பொருத்துக வகையில் கேட்கப்படும்."},
  {q:"'மியூட் ஸ்பார்க்' (MuteSpark) என்ற AI மாடலை அறிமுகப்படுத்திய அமைப்பு எது?", o:["Google", "OpenAI", "Meta", "Microsoft"], a:2, c:"Science", d:"Hard", e:"மெட்டா (Meta) நிறுவனம் மியூட் ஸ்பார்க் என்ற புதிய செயற்கை நுண்ணறிவு மாடலை அறிமுகப்படுத்தியது.", t:"AI தொழில்நுட்ப கண்டுபிடிப்புகள்."},
  {q:"14 நாட்களில் எவரெஸ்ட் அடிவார முகாமுக்கு மிதிவண்டியில் சென்ற முதல் இந்திய பெண் யார்?", o:["அருணிமா சின்ஹா", "திவ்யா சிங்", "பச்சேந்திரி பால்", "ஷிவாங்கி சிங்"], a:1, c:"Sports", d:"Hard", e:"திவ்யா சிங் 14 நாட்களில் சைக்கிள் மூலம் எவரெஸ்ட் பேஸ் கேம்பை அடைந்து சாதனை படைத்தார்.", t:"பெண்கள் படைக்கும் புதிய சாகச சாதனைகள்."},
  {q:"உலக ஹோமியோபதி தினம் (World Homeopathy Day) எப்போது கடைபிடிக்கப்படுகிறது?", o:["ஏப்ரல் 5", "ஏப்ரல் 7", "ஏப்ரல் 10", "ஏப்ரல் 15"], a:2, c:"Days", d:"Easy", e:"ஜெர்மனியை சேர்ந்த ஹோமியோபதி மருத்துவ முறையை கௌரவிக்கும் வகையில் ஏப்ரல் 10 அன்று இது கடைபிடிக்கப்படுகிறது.", t:"ஆயுஷ் (AYUSH) தொடர்பான முக்கிய தினங்கள்."},
  {q:"'ஆரோக்கியவன்' (Arogyavan) முன்னெடுப்பை தொடங்கிய அமைப்பு எது?", o:["NHAI", "WHO", "Ministry of Health", "NITI Aayog"], a:0, c:"Schemes", d:"Medium", e:"இந்திய தேசிய நெடுஞ்சாலை ஆணையம் (NHAI) நெடுஞ்சாலை ஓரங்களில் மூலிகை மரங்களை நடும் ஆரோக்கியவன் திட்டத்தை தொடங்கியது.", t:"சுற்றுச்சூழல் மற்றும் நெடுஞ்சாலை மேம்பாடு."},
  {q:"கமலா நீர்மின் திட்டம் (Kamala Hydropower) எங்கு அமைந்துள்ளது?", o:["அசாம்", "சிக்கிம்", "அருணாச்சல் பிரதேசம்", "மேகாலயா"], a:2, c:"Economy", d:"Medium", e:"கமலா நீர்மின் திட்டம் அருணாச்சல் பிரதேசத்தில் கட்டமைக்கப்பட்டு வருகிறது.", t:"வடகிழக்கு மாநிலங்களின் உள்கட்டமைப்பு திட்டங்கள்."},
  {q:"'ஆபரேஷன் ஹிம்சேது' (Operation Himsedhu) எந்த மாநிலத்துடன் தொடர்புடையது?", o:["ஜம்மு காஷ்மீர்", "இமாச்சல பிரதேசம்", "உத்தரகண்ட்", "சிக்கிம்"], a:3, c:"Defence", d:"Hard", e:"வடக்கு சிக்கிமில் பனிச்சரிவில் சிக்கியவர்களை மீட்பதற்காக ராணுவத்தால் ஹிம்சேது ஆபரேஷன் நடத்தப்பட்டது.", t:"பேரிடர் மீட்பு ராணுவ நடவடிக்கைகள்."},
  {q:"காப்புரிமை (Patent) விண்ணப்பங்கள் பதிவில் முதலிடம் பிடித்த இந்திய மாநிலம் எது?", o:["மகாராஷ்டிரா", "கர்நாடகா", "தமிழ்நாடு", "குஜராத்"], a:2, c:"TN Affairs", d:"Easy", e:"ஆராய்ச்சி மற்றும் காப்புரிமை பதிவுகளில் தமிழ்நாடு தொடர்ந்து முதலிடத்தை பிடித்துள்ளது.", t:"தமிழ்நாட்டின் கல்வி மற்றும் ஆராய்ச்சி சிறப்புகள்."},
  {q:"டஸ்லிக் (Dustlik) பயிற்சி என்பது இந்தியாவிற்கும் எந்த நாட்டிற்கும் இடையான கூட்டு ராணுவ பயிற்சி?", o:["கஜகஸ்தான்", "உஸ்பேகிஸ்தான்", "தஜிகிஸ்தான்", "கிர்கிஸ்தான்"], a:1, c:"Defence", d:"Medium", e:"டஸ்லிக் என்பது இந்தியா மற்றும் உஸ்பேகிஸ்தான் நாட்டு ராணுவங்களுக்கு இடையேயான பயிற்சியாகும்.", t:"மத்திய ஆசிய நாடுகளுடனான ராணுவ உறவுகள்."},
  {q:"D3 என்பது எந்த நோய்க்கான தடுப்பூசி?", o:["மலேரியா", "போலியோ", "டெங்கு", "கோவிட்"], a:2, c:"Science", d:"Easy", e:"D3 என்பது டெங்கு (Dengue) காய்ச்சலை தடுப்பதற்காக உருவாக்கப்பட்ட தடுப்பூசியாகும்.", t:"புதிய மருத்துவ கண்டுபிடிப்புகள்."},
  {q:"சமீபத்தில் எந்த மாநிலம் நக்சல் இல்லாத (Naxal-free) மாநிலமாக அறிவிக்கப்பட்டுள்ளது?", o:["சத்தீஸ்கர்", "ஜர்கண்ட்", "தெலங்கானா", "ஒடிசா"], a:2, c:"Polity", d:"Medium", e:"தெலங்கானா மாநிலம் முழுவதும் நக்சல் அச்சுறுத்தல் இல்லாத மாநிலமாக அறிவிக்கப்பட்டது.", t:"உள்நாட்டு பாதுகாப்பு (Internal Security) சார்ந்த செய்திகள்."},
  {q:"அமெரிக்காவில் சுவாமி விவேகானந்தரின் முதல் முழு உருவச்சிலை எங்கு திறக்கப்பட்டது?", o:["நியூயார்க்", "வாஷிங்டன்", "சியாட்டில்", "சான் பிரான்சிஸ்கோ"], a:2, c:"International", d:"Hard", e:"அமெரிக்காவின் சியாட்டில் (Seattle) நகரில் விவேகானந்தரின் முதல் சிலை திறக்கப்பட்டது.", t:"இந்திய பண்பாட்டின் சர்வதேச அடையாளங்கள்."},
  {q:"'மொசாட்' (Mossad) என்பது எந்த நாட்டின் உளவு நிறுவனம்?", o:["ஈரான்", "ரஷ்யா", "இஸ்ரேல்", "அமெரிக்கா"], a:2, c:"International", d:"Easy", e:"மொசாட் என்பது இஸ்ரேல் நாட்டின் புகழ்பெற்ற உளவு நிறுவனமாகும்.", t:"சர்வதேச உளவு அமைப்புகள் பொருத்துகவாக கேட்கப்படும்."},
  {q:"இந்தியாவின் முதல் குவாண்டம் வசதி மையம் (Quantum Facility Center) எங்கு திறக்கப்பட்டது?", o:["தமிழ்நாடு", "ஆந்திர பிரதேசம்", "கர்நாடகா", "கேரளா"], a:1, c:"Science", d:"Medium", e:"குவாண்டம் தொழில்நுட்பத்திற்கான முதல் வசதி மையம் ஆந்திர பிரதேசத்தில் திறக்கப்பட்டது.", t:"எதிர்கால தொழில்நுட்பங்கள் (Future Tech)."},
  {q:"தேசிய திருநங்கைகள் தினம் (National Transgenders Day) எப்போது அனுசரிக்கப்படுகிறது?", o:["ஏப்ரல் 10", "ஏப்ரல் 15", "மே 15", "ஜூன் 1"], a:1, c:"Days", d:"Medium", e:"ஏப்ரல் 15 ஆம் தேதி தேசிய திருநங்கைகள் தினமாக இந்தியாவில் கடைபிடிக்கப்படுகிறது.", t:"விளிம்புநிலை சமூகங்களின் உரிமைகள் தொடர்பான தினங்கள்."},
  {q:"யுவிகா (YUVIKA) திட்டத்தை அறிமுகப்படுத்திய அமைப்பு எது?", o:["DRDO", "CSIR", "ISRO", "கல்வி அமைச்சகம்"], a:2, c:"Science", d:"Easy", e:"பள்ளி மாணவர்களிடையே விண்வெளி அறிவியல் விழிப்புணர்வை ஏற்படுத்த ISRO யுவிகா திட்டத்தை நடத்துகிறது.", t:"அறிவியல் திறன் மேம்பாட்டுத் திட்டங்கள்."},
  {q:"கியூஆர் (QR) கோடு அடிப்படையிலான கருத்து தெரிவித்தல் முறையை எந்த மாநில போக்குவரத்து கழகம் அறிமுகப்படுத்தியது?", o:["தமிழ்நாடு", "கேரளா", "குஜராத்", "மகாராஷ்டிரா"], a:2, c:"Polity", d:"Medium", e:"குஜராத் மாநில போக்குவரத்து கழகம் பயணிகளிடம் QR Code மூலம் கருத்து கேட்கும் முறையை கொண்டுவந்தது.", t:"மின்-ஆளுமை (E-Governance) முயற்சிகள்."},
  {q:"ஏப்ரல் 2026 நிலவரப்படி இந்தியாவின் முதன்மை வர்த்தக நாடாக (Top Trading Partner) எந்த நாடு உள்ளது?", o:["அமெரிக்கா", "சீனா", "UAE", "ரஷ்யா"], a:1, c:"Economy", d:"Medium", e:"அமெரிக்காவை பின்னுக்கு தள்ளி சீனா மீண்டும் இந்தியாவின் முதன்மை வர்த்தக நாடாக உருவெடுத்துள்ளது.", t:"பொருளாதார இறக்குமதி/ஏற்றுமதி புள்ளிவிவரங்கள்."},
  {q:"இந்தியாவின் முதல் குறைக்கடத்தி சிறப்பு பொருளாதார மண்டலம் (Semiconductor SEZ) எங்கு அமைக்கப்படுகிறது?", o:["தமிழ்நாடு", "குஜராத்", "கர்நாடகா", "தெலுங்கானா"], a:1, c:"Economy", d:"Medium", e:"குஜராத் மாநிலத்தில் முதல் செமிகண்டக்டர் SEZ அமைக்கப்படுகிறது.", t:"பொருளாதார மண்டலங்கள் மற்றும் முதலீடுகள்."},
  {q:"9-வது இந்திய பெருங்கடல் மாநாடு எங்கு நடைபெற்றது?", o:["மாலத்தீவு", "இலங்கை", "மொரிசியஸ்", "இந்தியா"], a:2, c:"International", d:"Hard", e:"மொரிசியஸ் நாட்டில் 9வது இந்திய பெருங்கடல் மாநாடு (Indian Ocean Conference) நடைபெற்றது.", t:"சர்வதேச உச்சி மாநாடுகள் நடைபெறும் இடங்கள்."},
  {q:"மொத்த உள்நாட்டு உற்பத்தியில் (GDP) இந்தியாவின் உலகளாவிய தரவரிசை என்ன?", o:["3", "4", "5", "6"], a:3, c:"Economy", d:"Easy", e:"சமீபத்திய தரவுகளின்படி இந்தியா 6வது இடத்திற்கு தள்ளப்பட்டுள்ளது.", t:"பொருளாதார தரவரிசைகள் தொடர்ந்து மாறுபடும், கவனமாக இருக்கவும்."},
  {q:"2026 ஆம் ஆண்டுக்கான லதா தீனநாத் மங்கேஷ்கர் விருது யாருக்கு வழங்கப்பட்டது?", o:["ஆஷா போஸ்லே", "அமிதாப் பச்சன்", "கைலாஸ் சத்யார்த்தி", "ஏ.ஆர். ரஹ்மான்"], a:2, c:"Awards", d:"Medium", e:"நோபல் பரிசு பெற்ற குழந்தைகள் உரிமை ஆர்வலர் கைலாஸ் சத்யார்த்திக்கு இவ்விருது வழங்கப்பட்டது.", t:"தேசிய அளவிலான உயரிய கலை/சமூக சேவகர் விருதுகள்."},
  {q:"2026 FIDE செஸ் மகளிர் கேண்டிடேட்ஸ் போட்டியில் வென்றவர் யார்?", o:["கோனேரு ஹம்பி", "துரோணவல்லி ஹரிகா", "வைசாலி ரமேஷ் பாபு", "திவ்யா தேஷ்முக்"], a:2, c:"Sports", d:"Easy", e:"தமிழ்நாட்டைச் சேர்ந்த வைசாலி ரமேஷ் பாபு இப்போட்டியில் அபார வெற்றி பெற்றார்.", t:"தமிழக விளையாட்டு வீரர்களின் சர்வதேச சாதனைகள்."},
  {q:"ஆயுஷ் ஷெட்டி எந்த விளையாட்டோடு தொடர்புடையவர்?", o:["செஸ்", "டென்னிஸ்", "பேட்மிண்டன்", "துப்பாக்கி சுடுதல்"], a:2, c:"Sports", d:"Medium", e:"ஆயுஷ் ஷெட்டி ஒரு முன்னணி இந்திய பேட்மிண்டன் வீரராவார்.", t:"விளையாட்டு வீரர்கள் மற்றும் தொடர்புடைய விளையாட்டுகள்."},
  {q:"சமீபத்தில் செய்திகளில் இடம்பெற்ற ஹொகேசார் ஏரி (Hokersar Lake) எங்கு அமைந்துள்ளது?", o:["லடாக்", "ஜம்மு காஷ்மீர்", "உத்தரகண்ட்", "சிக்கிம்"], a:1, c:"Environment", d:"Medium", e:"ஹொகேசார் ஏரி ஜம்மு மற்றும் காஷ்மீரில் அமைந்துள்ள முக்கியமான ஈரநிலமாகும்.", t:"சுற்றுச்சூழல் முக்கியத்துவம் வாய்ந்த ஏரிகள்."},
  {q:"செங்கடலின் (Red Sea) எல்லை நாடுகள் யாவை?", o:["எகிப்து, சூடான், எரித்திரியா, சவுதி அரேபியா", "எகிப்து, ஈரான், ஈராக், குவைத்", "ஓமன், ஏமன், சோமாலியா, கென்யா", "துருக்கி, சிரியா, லெபனான், இஸ்ரேல்"], a:0, c:"International", d:"Hard", e:"எகிப்து, சூடான், எரித்திரியா, ஜிபூட்டி, சவுதி அரேபியா, ஏமன் ஆகியவை செங்கடலின் எல்லை நாடுகளாகும்.", t:"UPSC/TNPSC தேர்வுகளில் புவியியல் வரைபட அடிப்படையிலான கேள்விகள்."},
  {q:"உலக பாரம்பரிய தினம் (World Heritage Day) எப்போது கடைபிடிக்கப்படுகிறது?", o:["ஏப்ரல் 10", "ஏப்ரல் 15", "ஏப்ரல் 18", "ஏப்ரல் 22"], a:2, c:"Days", d:"Easy", e:"ஏப்ரல் 18 ஆம் தேதி உலக பாரம்பரிய தினமாக யுனெஸ்கோவால் அங்கீகரிக்கப்பட்டுள்ளது.", t:"கலை மற்றும் கலாச்சார சின்னங்களை பாதுகாக்கும் தினங்கள்."},
  {q:"காசி மற்றும் காரோ (Khasi & Garo) மொழிகளை அலுவல் மொழியாக அங்கீகரித்த மாநிலம் எது?", o:["அசாம்", "நாகாலாந்து", "மேகாலயா", "திரிபுரா"], a:2, c:"Polity", d:"Medium", e:"மேகாலயா அரசு காசி மற்றும் காரோ பழங்குடியின மொழிகளை அலுவல் மொழிகளாக அறிவித்துள்ளது.", t:"மாநில மொழிகள் மற்றும் பழங்குடியின மேம்பாடு."},
  {q:"சமீபத்தில் 'பாக் சிலிக்கா' (Paxilica) முன்னெடுப்பில் இணைந்த நாடு எது?", o:["ஜப்பான்", "பிலிப்பைன்ஸ்", "இந்தியா", "ஆஸ்திரேலியா"], a:1, c:"International", d:"Hard", e:"அமெரிக்காவால் தொடங்கப்பட்ட அமைப்பான இதில் பிலிப்பைன்ஸ் சமீபத்தில் இணைந்தது (இந்தியாவும் இதில் உள்ளது).", t:"சர்வதேச கூட்டமைப்புகள்."},
  {q:"'நீர் முன்னணி' (Water Forward Initiative) திட்டத்தை தொடங்கிய அமைப்பு எது?", o:["IMF", "UNEP", "உலக வங்கி (World Bank)", "WEF"], a:2, c:"Environment", d:"Medium", e:"உலக வங்கி நீர் பாதுகாப்பை உறுதி செய்வதற்காக இந்த முன்னெடுப்பை தொடங்கியுள்ளது.", t:"உலகளாவிய சுற்றுச்சூழல் திட்டங்கள்."},
  {q:"இந்தியாவின் முதல் பாறை செதுக்கல் பாதுகாப்பு பூங்கா (Petroglyph Conservation Park) எங்கு அமைந்துள்ளது?", o:["மத்திய பிரதேசம்", "லடாக்", "தமிழ்நாடு", "ராஜஸ்தான்"], a:1, c:"Environment", d:"Hard", e:"பழங்கால பாறை ஓவியங்களை பாதுகாக்க லடாக்கில் இப்பூங்கா அமைக்கப்பட்டுள்ளது.", t:"தொல்லியல் மற்றும் வரலாற்று பாதுகாப்பு மையங்கள்."},
  {q:"'விஷவ சூத்திரத்தை' (Vishwa Sutra) வெளியிட்ட அமைச்சகம் எது?", o:["கலாச்சார அமைச்சகம்", "சுற்றுலா அமைச்சகம்", "ஜவுளி அமைச்சகம்", "வெளியுறவு அமைச்சகம்"], a:2, c:"Schemes", d:"Hard", e:"ஜவுளி அமைச்சகம் (Ministry of Textiles) இந்திய கைத்தறி பாரம்பரியத்தை உலகறியச் செய்ய இதை வெளியிட்டது.", t:"மத்திய அரசின் புதிய திட்டங்கள்."},
  {q:"'அபை' (Abhai) என்ற சாட்பாட்டை (Chatbot) உருவாக்கிய அமைப்பு எது?", o:["CBI", "RAW", "ISRO", "Election Commission"], a:0, c:"Science", d:"Medium", e:"மத்திய புலனாய்வு அமைப்பு (CBI) பொதுமக்களின் புகார்களுக்காக அபை சாட்பாட்டை உருவாக்கியது.", t:"அரசு அமைப்புகளில் AI தொழில்நுட்ப பயன்பாடு."},
  {q:"ரெலோஸ் (RELOS) ஒப்பந்தம் இந்தியாவிற்கும் எந்த நாட்டிற்கும் இடையானது?", o:["அமெரிக்கா", "ரஷ்யா", "பிரான்ஸ்", "இஸ்ரேல்"], a:1, c:"International", d:"Hard", e:"ரெலோஸ் (Reciprocal Exchange of Logistics Agreement) என்பது இந்தியா-ரஷ்யா இடையிலான ராணுவ தளவாட ஒப்பந்தம்.", t:"சர்வதேச பாதுகாப்பு ஒப்பந்தங்கள்."},
  {q:"தேசிய குடிமை பணிகள் தினம் (Civil Services Day) எப்போது கடைபிடிக்கப்படுகிறது?", o:["ஏப்ரல் 14", "ஏப்ரல் 21", "மே 1", "ஜூன் 5"], a:1, c:"Days", d:"Easy", e:"ஏப்ரல் 21 ஆம் தேதி குடிமைப் பணிகள் தினம் இந்தியாவில் கொண்டாடப்படுகிறது.", t:"ஆளுமை மற்றும் சிவில் சர்வீஸ் தொடர்பான முக்கிய தினம்."},
  {q:"'ஒமேகா பால்' (Omega Ball) என்ற புதிய விளையாட்டை அறிமுகப்படுத்திய நிறுவனம் எது?", o:["IIT Bombay", "IIT Delhi", "IIT Madras", "IIM Ahmedabad"], a:2, c:"Sports", d:"Medium", e:"மூன்று அணிகள் விளையாடும் ஒமேகா பால் என்ற கால்பந்து போன்ற விளையாட்டை ஐஐடி மெட்ராஸ் உருவாக்கியுள்ளது.", t:"தமிழ்நாட்டு கல்வி நிறுவனங்களின் புதிய கண்டுபிடிப்புகள்."},
  {q:"இந்தியாவின் முதல் 3D குறைக்கடத்தி பேக்கேஜிங் பிரிவு எங்கு அமைந்துள்ளது?", o:["குஜராத்", "தமிழ்நாடு", "ஒடிசா", "கர்நாடகா"], a:2, c:"Science", d:"Hard", e:"ஒடிசா மாநிலத்தில் இந்தியாவின் முதல் 3D செமிகண்டக்டர் பேக்கேஜிங் யூனிட் அமைக்கப்பட்டுள்ளது.", t:"உயர் தொழில்நுட்ப உற்பத்தி மையங்கள்."},
  {q:"பிரைலி மற்றும் சைகை மொழி சேவைகளை தொடங்கிய முதல் மண்டல கடவுச்சீட்டு அலுவலகம் எங்குள்ளது?", o:["சென்னை", "மும்பை", "போபால்", "கொல்கத்தா"], a:2, c:"Polity", d:"Medium", e:"மத்திய பிரதேசத்தின் போபால் பாஸ்போர்ட் அலுவலகம் மாற்றுத்திறனாளிகளுக்காக இந்த சேவையை அறிமுகப்படுத்தியது.", t:"அணுகக்கூடிய (Accessible) அரசு சேவைகள்."},
  {q:"உலக பூமி தினம் (World Earth Day) எப்போது அனுசரிக்கப்படுகிறது?", o:["ஏப்ரல் 7", "ஏப்ரல் 22", "மே 22", "ஜூன் 5"], a:1, c:"Days", d:"Easy", e:"ஏப்ரல் 22 ஆம் தேதி உலக பூமி தினம் அனுசரிக்கப்படுகிறது.", t:"சுற்றுச்சூழல் சார்ந்த மிக முக்கியமான தினங்களில் ஒன்று."},
  {q:"ஷேகாஜில் பறவைகள் சரணாலயம் (இந்தியாவின் 99வது ராம்சார் தளம்) எங்குள்ளது?", o:["குஜராத்", "உத்தர பிரதேசம்", "பீகார்", "தமிழ்நாடு"], a:1, c:"Environment", d:"Medium", e:"உத்தர பிரதேசத்தில் உள்ள ஷேகாஜில் பறவைகள் சரணாலயம் 99வது ராம்சார் தளமாக அறிவிக்கப்பட்டது.", t:"ராம்சார் ஈரநிலங்கள் பட்டியல் TNPSC-ல் அடிக்கடி கேட்கப்படும்."},
  {q:"ஒரு தலைமுறை குழந்தைகளை புகைப்பிடிப்பதை (Smoking Ban) தடை செய்த நாடு எது?", o:["கனடா", "நியூசிலாந்து", "UK (இங்கிலாந்து)", "ஆஸ்திரேலியா"], a:2, c:"International", d:"Medium", e:"இங்கிலாந்து (UK) அரசு 2009க்கு பிறகு பிறந்தவர்கள் சிகரெட் வாங்குவதை வாழ்நாள் முழுவதும் தடை செய்யும் சட்டத்தை கொண்டுவந்தது.", t:"சர்வதேச சுகாதார கொள்கைகள்."},
  {q:"ஆங்கில மொழி தினம் (English Language Day) எப்போது கடைபிடிக்கப்படுகிறது?", o:["ஏப்ரல் 23", "ஏப்ரல் 25", "மே 1", "மே 5"], a:0, c:"Days", d:"Medium", e:"வில்லியம் ஷேக்ஸ்பியரின் பிறந்த மற்றும் இறந்த தினமான ஏப்ரல் 23 ஆங்கில மொழி தினமாக ஐநாவால் அங்கீகரிக்கப்பட்டுள்ளது.", t:"ஐக்கிய நாடுகளின் மொழி தினங்கள்."},
  {q:"சமீபத்தில் காலமான நதேன்லா பாஸ்கர்ராவ் எந்த மாநிலத்தின் முன்னாள் முதலமைச்சர்?", o:["தமிழ்நாடு", "கர்நாடகா", "ஆந்திர பிரதேசம்", "கேரளா"], a:2, c:"Polity", d:"Hard", e:"என். பாஸ்கர்ராவ் ஆந்திர பிரதேசத்தின் முன்னாள் முதலமைச்சராக பதவி வகித்தவர்.", t:"முக்கிய அரசியல் தலைவர்களின் மறைவு."},
  {q:"உலகின் முதல் நிரந்தர அணுக்கழிவு பாதுகாப்பு அறையை கட்டவிருக்கும் நாடு எது?", o:["அமெரிக்கா", "பிரான்ஸ்", "பின்லாந்து", "சீனா"], a:2, c:"Environment", d:"Hard", e:"பின்லாந்து நாடு அணுக்கழிவுகளை நிரந்தரமாக புதைக்கும் நிலத்தடி அறையை உருவாக்கி வருகிறது.", t:"சுற்றுச்சூழல் பாதுகாப்பு தொழில்நுட்பங்கள்."},
  {q:"2026 ஆம் ஆண்டுக்கான லாரஸ் உலக விளையாட்டு விருதை வென்றவர் யார்?", o:["லியோனல் மெஸ்ஸி", "நோவக் ஜோகோவிச்", "கார்லோஸ் ஆல்கராஸ்", "விராட் கோலி"], a:2, c:"Awards", d:"Medium", e:"டென்னிஸ் வீரர் கார்லோஸ் ஆல்கராஸ் மதிப்புமிக்க லாரஸ் (Laureus) விருதை வென்றுள்ளார்.", t:"விளையாட்டு உலகின் ஆஸ்கார் என அழைக்கப்படும் உயரிய விருது."},
  {q:"2026 உலக பாரா தடகள போட்டி எங்கு நடைபெற உள்ளது?", o:["பாரிஸ்", "டாஷ்கண்ட்", "புதுடெல்லி", "டோக்கியோ"], a:1, c:"Sports", d:"Medium", e:"உஸ்பேகிஸ்தானின் தலைநகரான டாஷ்கண்டில் இப்போட்டி நடைபெறுகிறது.", t:"சர்வதேச விளையாட்டுப் போட்டிகள் நடைபெறும் இடங்கள்."},
  {q:"தேசிய பஞ்சாயத்ராஜ் தினம் எப்போது அனுசரிக்கப்படுகிறது?", o:["ஏப்ரல் 14", "ஏப்ரல் 24", "மே 1", "அக்டோபர் 2"], a:1, c:"Days", d:"Easy", e:"73வது அரசியலமைப்பு சட்டத்திருத்தம் அமலுக்கு வந்த ஏப்ரல் 24 பஞ்சாயத்ராஜ் தினமாக கொண்டாடப்படுகிறது.", t:"உள்ளாட்சி நிர்வாகம் தொடர்பான மிக முக்கிய தினம்."},
  {q:"கட்சி தாவல் தடை சட்டம் (Anti-Defection Law) தொடர்பான அரசியலமைப்பு திருத்தம் எது?", o:["42வது", "44வது", "52வது", "61வது"], a:2, c:"Polity", d:"Easy", e:"1985 இல் கொண்டுவரப்பட்ட 52வது சட்டத்திருத்தம் மூலம் கட்சி தாவல் தடை சட்டம் (10வது அட்டவணை) சேர்க்கப்பட்டது.", t:"அரசியலமைப்பு திருத்தங்கள் Group 1-ல் கட்டாயம் கேட்கப்படும்."},
  {q:"சிஎம் இன்ஸ்பயர் (CM Inspire) திட்டத்தை அறிமுகப்படுத்திய மாநிலம் எது?", o:["மேகாலயா", "அசாம்", "மிசோரம்", "நாகாலாந்து"], a:0, c:"Schemes", d:"Hard", e:"மேகாலயா அரசு இளைஞர்களின் தொழில்முனைவை ஊக்குவிக்க இத்திட்டத்தை தொடங்கியது.", t:"மாநில அரசுகளின் திறன் மேம்பாட்டு திட்டங்கள்."},
  {q:"குழந்தைகளுக்கு சமூக ஊடகங்களை தடை செய்த நாடு எது (சமீபத்தில்)?", o:["மலேசியா", "சிங்கப்பூர்", "இந்தியா", "இலங்கை"], a:0, c:"International", d:"Medium", e:"துருக்கி, நார்வேயை தொடர்ந்து மலேசியாவும் 16 வயதுக்குட்பட்ட குழந்தைகளுக்கு சமூக ஊடகங்களை தடை செய்தது.", t:"இணைய பாதுகாப்பு மற்றும் குழந்தைகள் உரிமைகள்."},
  {q:"அமெரிக்க சர்வதேச புகழரங்கில் (US International Hall of Fame) கௌரவப்படுத்தப்பட்ட இந்தியர் யார்?", o:["தீரஜ் சேத்", "உபேந்திர திவேதி", "அனில் சௌகான்", "மனோஜ் பாண்டே"], a:1, c:"Awards", d:"Hard", e:"இந்திய ராணுவ தளபதி உபேந்திர திவேதி அமெரிக்க ராணுவத்தால் புகழரங்கில் கௌரவப்படுத்தப்பட்டார்.", t:"இந்திய பாதுகாப்பு அதிகாரிகளின் சர்வதேச அங்கீகாரம்."},
  {q:"உலக மலேரியா தினம் எப்போது கடைபிடிக்கப்படுகிறது?", o:["ஏப்ரல் 20", "ஏப்ரல் 25", "மே 5", "மே 15"], a:1, c:"Days", d:"Easy", e:"ஏப்ரல் 25 ஆம் தேதி உலக மலேரியா தினமாக கடைபிடிக்கப்படுகிறது.", t:"நோய்கள் விழிப்புணர்வு தினங்கள்."},
  {q:"உலக பென்குயின் தினம் (World Penguin Day) எப்போது அனுசரிக்கப்படுகிறது?", o:["ஏப்ரல் 22", "ஏப்ரல் 25", "மே 1", "ஜூன் 5"], a:1, c:"Days", d:"Medium", e:"ஏப்ரல் 25 ஆம் தேதி பென்குயின்களின் இடம்பெயர்வைக் குறிக்கும் வகையில் இது அனுசரிக்கப்படுகிறது.", t:"வனவிலங்கு பாதுகாப்பு தினங்கள்."},
  {q:"நித்தி ஆயோகின் (NITI Aayog) புதிய துணை தலைவராக நியமிக்கப்பட்டவர் யார்?", o:["அசோக் குமார் லஹிரி", "சுமன் பெர்ரி", "அரவிந்த் பனகாரியா", "அமிதாப் காந்த்"], a:0, c:"Polity", d:"Medium", e:"2026 ஏப்ரல் நடப்பு நிகழ்வுகளின்படி அசோக் குமார் லஹிரி நித்தி ஆயோக் துணை தலைவராக நியமிக்கப்பட்டுள்ளார்.", t:"மத்திய அரசின் முக்கிய நியமனங்கள்."},
  {q:"'Curious and Classified' என்ற புத்தகத்தின் ஆசிரியர் யார்?", o:["விபின் ராவத்", "எம்எம் நரவணி", "ஆர் கே மாதவன்", "சசி தரூர்"], a:1, c:"Books", d:"Hard", e:"முன்னாள் ராணுவ தளபதி எம்எம் நரவணி (M.M. Naravane) இப்புத்தகத்தை எழுதியுள்ளார்.", t:"ராணுவ தலைவர்களின் சுயசரிதைகள்."},
  {q:"சர்வதேச விதை தினம் (International Seed Day) எப்போது?", o:["ஏப்ரல் 22", "ஏப்ரல் 26", "மே 10", "ஜூன் 1"], a:1, c:"Days", d:"Medium", e:"காப்புரிமை இல்லாத விவசாய விதைகளை ஊக்குவிக்க ஏப்ரல் 26 விதை தினமாக அனுசரிக்கப்படுகிறது.", t:"வேளாண்மை தொடர்பான சர்வதேச தினங்கள்."},
  {q:"உலக அறிவுசார் சொத்துரிமை தினம் (World IP Day) எப்போது?", o:["ஏப்ரல் 26", "மே 1", "மே 26", "ஜூன் 5"], a:0, c:"Days", d:"Medium", e:"காப்புரிமை, வர்த்தக முத்திரை விழிப்புணர்வுக்காக ஏப்ரல் 26 IP தினமாக கடைபிடிக்கப்படுகிறது.", t:"பொருளாதார மற்றும் சட்ட விழிப்புணர்வு."},
  {q:"உலக வடிவமைப்பு தினம் (World Design Day) எப்போது?", o:["ஏப்ரல் 27", "மே 5", "மே 15", "ஜூன் 10"], a:0, c:"Days", d:"Hard", e:"தொழில்துறை மற்றும் வரைகலை வடிவமைப்பை சிறப்பிக்க ஏப்ரல் 27 அனுசரிக்கப்படுகிறது.", t:"கலை மற்றும் தொழில்நுட்ப தினங்கள்."},
  {q:"டான்பெட் (TANFED) என்ற கூட்டுறவு அமைப்பு தமிழ்நாட்டில் எந்த ஆண்டு நிறுவப்பட்டது?", o:["1950", "1959", "1965", "1972"], a:1, c:"TN Affairs", d:"Medium", e:"தமிழ்நாடு மாநில தலைமை கூட்டுறவு வங்கி (TANFED) 1959 இல் நிறுவப்பட்டது.", t:"தமிழ்நாடு கூட்டுறவு அமைப்புகளின் வரலாறு."},
  {q:"சமீபத்தில் இந்தியாவுடன் தடையற்ற வர்த்தக ஒப்பந்தம் (FTA) கையெழுத்திட்ட நாடு எது?", o:["நியூசிலாந்து", "கனடா", "பிரிட்டன்", "தென் ஆப்பிரிக்கா"], a:0, c:"International", d:"Medium", e:"பொருளாதார உறவுகளை மேம்படுத்த நியூசிலாந்துடன் இந்தியா FTA ஒப்பந்தம் செய்துள்ளது.", t:"சர்வதேச வர்த்தக ஒப்பந்தங்கள் (Economy & IR)."},
  {q:"பஸ்ரா நினைவிடம் (Basra Memorial) எங்கு அமைந்துள்ளது?", o:["ஆப்கானிஸ்தான்", "ஈராக்", "ஈரான்", "சிரியா"], a:1, c:"International", d:"Easy", e:"முதல் உலகப் போரில் இறந்த வீரர்களுக்கான பஸ்ரா நினைவிடம் ஈராக்கில் உள்ளது.", t:"வரலாற்று முக்கியத்துவம் வாய்ந்த சர்வதேச இடங்கள்."},
  {q:"பெமினா மிஸ் இந்தியா வேர்ல்ட் 2026 பட்டத்தை வென்றவர் யார்?", o:["சினி ஷெட்டி", "சாத்வி செயல்", "மானசா வாரணாசி", "நந்தினி குப்தா"], a:1, c:"Awards", d:"Medium", e:"சாத்வி செயல் 2026 ஆம் ஆண்டிற்கான மிஸ் இந்தியா பட்டத்தை வென்றுள்ளார்.", t:"தேசிய அழகிப் போட்டிகள் மற்றும் விருதுகள்."},
  {q:"உலக பணியிட பாதுகாப்பு மற்றும் சுகாதார தினம் எப்போது?", o:["ஏப்ரல் 28", "மே 1", "மே 5", "ஜூன் 1"], a:0, c:"Days", d:"Medium", e:"பணியிடங்களில் விபத்துகளை தவிர்க்க விழிப்புணர்வு ஏற்படுத்தும் வகையில் ஏப்ரல் 28 கடைபிடிக்கப்படுகிறது.", t:"தொழிலாளர் நலன் சார்ந்த தினங்கள்."},
  {q:"Google AI தரவு மையத்தின் (Data Hub) அடிக்கல் எங்கு நாட்டப்பட்டது?", o:["சென்னை", "பெங்களூரு", "விசாகப்பட்டினம்", "ஹைதராபாத்"], a:2, c:"Science", d:"Medium", e:"ஆந்திர பிரதேசத்தின் விசாகப்பட்டினத்தில் கூகுள் தனது AI தரவு மையத்தை அமைக்கிறது.", t:"பன்னாட்டு நிறுவனங்களின் இந்தியாவில் முதலீடுகள்."},
  {q:"சமீபத்தில் ஒபேக் (OPEC) அமைப்பிலிருந்து வெளியேறிய நாடு எது?", o:["கத்தார்", "UAE", "அங்கோலா", "ஈக்வடார்"], a:1, c:"Economy", d:"Medium", e:"(வீடியோ பதிவின்படி) ஐக்கிய அரபு அமீரகம் (UAE) அமைப்பிலிருந்து வெளியேறுவதாக அறிவித்தது.", t:"எண்ணெய் உற்பத்தி நாடுகளின் கூட்டமைப்பு."},
  {q:"நைட் பிராங்கின் செல்வ அறிக்கை 2026-ல் (Wealth Report) முதலிடம் பிடித்த நாடு?", o:["சீனா", "அமெரிக்கா", "சுவிட்சர்லாந்து", "சிங்கப்பூர்"], a:1, c:"Economy", d:"Easy", e:"அமெரிக்கா உலகிலேயே அதிக கோடீஸ்வரர்களை கொண்டு முதலிடத்தில் உள்ளது.", t:"பொருளாதார குறியீடுகள் மற்றும் அறிக்கைகள்."},
  {q:"ISSF ஜூனியர் உலகக் கோப்பை துப்பாக்கி சுடுதல் போட்டியில் இந்தியாவின் இடம் என்ன?", o:["முதலிடம்", "இரண்டாம் இடம்", "மூன்றாம் இடம்", "நான்காம் இடம்"], a:0, c:"Sports", d:"Easy", e:"இந்தியா அதிக பதக்கங்களை வென்று புள்ளிப்பட்டியலில் முதலிடத்தை பிடித்தது.", t:"விளையாட்டில் இந்திய அணியின் ஆதிக்கம்."},
  {q:"சர்வதேச நடன தினம் (International Dance Day) எப்போது?", o:["ஏப்ரல் 29", "மே 10", "மே 15", "ஜூன் 5"], a:0, c:"Days", d:"Easy", e:"ஜீன் ஜார்ஜஸ் நோவர் பிறந்த நாளான ஏப்ரல் 29 நடன தினமாக கொண்டாடப்படுகிறது.", t:"கலை மற்றும் கலாச்சார தினங்கள்."},
  {q:"அஸ்ட்ரானமி தினம் (Astronomy Day) எப்போது?", o:["ஏப்ரல் 22", "ஏப்ரல் 29", "மே 1", "ஜூன் 21"], a:1, c:"Days", d:"Hard", e:"வானியல் ஆய்வுகளை ஊக்குவிக்க ஏப்ரல் 29 வானியல் தினமாக கடைபிடிக்கப்படுகிறது.", t:"அறிவியல் விழிப்புணர்வு தினங்கள்."},
  {q:"இந்தியாவின் முதல் திருநங்கை கிரிக்கெட் நடுவர் (Transgender Umpire) யார்?", o:["மேனக்கா", "ரித்திகா ஸ்ரீ", "பவானி", "கல்கி"], a:1, c:"Sports", d:"Medium", e:"ரித்திகா ஸ்ரீ இந்தியாவின் முதல் திருநங்கை நடுவராக பொறுப்பேற்று வரலாறு படைத்தார்.", t:"விளையாட்டுத் துறையில் சமூக உள்ளடக்கம்."},
  {q:"கங்கா விரைவுச்சாலை (Ganga Expressway) எங்கு கட்டப்பட்டு வருகிறது?", o:["உத்தரகண்ட்", "பீகார்", "உத்தர பிரதேசம்", "மேற்கு வங்காளம்"], a:2, c:"Economy", d:"Medium", e:"உத்தர பிரதேசத்தில் கட்டப்பட்டு வரும் இது இந்தியாவின் மிக நீளமான விரைவுச்சாலைகளில் ஒன்றாகும்.", t:"தேசிய உள்கட்டமைப்பு திட்டங்கள்."},

  // Converting 10 questions to Statement-Type to fulfill mix requirement
  {q:"பின்வரும் கூற்றுகளை ஆராய்க (மா அரங்கநாதன் விருது):", o:["1 மட்டும் சரி", "2 மட்டும் சரி", "இரண்டும் சரி", "இரண்டும் தவறு"], a:2, c:"Awards", d:"Medium", e:"இரண்டு கூற்றுகளும் சரியானவை. இவ்விருது தமிழ் இலக்கிய பங்களிப்பிற்காக வழங்கப்படுகிறது.", t:"தமிழ் இலக்கிய விருதுகள் தேர்வுகளில் முக்கியம்.", type:"stmt", stmts:["2026 ஆம் ஆண்டுக்கான மா அரங்கநாதன் விருதை விட்டல்ராவ் மற்றும் அம்ஷன் குமார் வென்றனர்.","இவ்விருது தமிழ் இலக்கியத்திற்கான சிறந்த பங்களிப்பிற்காக வழங்கப்படுகிறது."]},
  {q:"கேலோ இந்தியா பழங்குடியின விளையாட்டுப் போட்டிகள் குறித்து:", o:["1 மட்டும் சரி", "2 மட்டும் சரி", "இரண்டும் சரி", "இரண்டும் தவறு"], a:2, c:"Sports", d:"Medium", e:"கர்நாடகா மாநிலம் 2026 விளையாட்டுகளில் முதலிடத்தை பிடித்தது.", t:"கேலோ இந்தியா வெற்றியாளர்கள்.", type:"stmt", stmts:["2026 கேலோ இந்தியா பழங்குடியின விளையாட்டுகளில் கர்நாடகா முதலிடம் பிடித்தது.","இது பழங்குடியின இளைஞர்களின் விளையாட்டு திறனை ஊக்குவிக்கிறது."]},
  {q:"உலக சுகாதார தினம் (World Health Day) குறித்து:", o:["1 மட்டும் சரி", "2 மட்டும் சரி", "இரண்டும் சரி", "இரண்டும் தவறு"], a:2, c:"Days", d:"Easy", e:"WHO தொடங்கப்பட்ட ஏப்ரல் 7 உலக சுகாதார தினமாக கடைபிடிக்கப்படுகிறது.", t:"WHO தொடர்பான தினங்கள்.", type:"stmt", stmts:["உலக சுகாதார தினம் ஏப்ரல் 7 ஆம் தேதி அனுசரிக்கப்படுகிறது.","அன்று உலக சுகாதார நிறுவனம் (WHO) நிறுவப்பட்டது."]},
  {q:"E20 பெட்ரோல் குறித்து பின்வரும் கூற்றுகளை ஆராய்க:", o:["1 மட்டும் சரி", "2 மட்டும் சரி", "இரண்டும் சரி", "இரண்டும் தவறு"], a:2, c:"Environment", d:"Medium", e:"ஏப்ரல் 1, 2026 முதல் E20 பெட்ரோல் நாடு முழுவதும் அமலுக்கு வந்தது.", t:"பசுமை எரிசக்தி நடவடிக்கைகள்.", type:"stmt", stmts:["E20 பெட்ரோல் ஏப்ரல் 1, 2026 முதல் நாடு முழுவதும் அறிமுகப்படுத்தப்பட்டது.","இதில் 20% எத்தனால் மற்றும் 80% பெட்ரோல் கலக்கப்பட்டிருக்கும்."]},
  {q:"சைக்ளோன் (Cyclone) ராணுவப் பயிற்சி பற்றி:", o:["1 மட்டும் சரி", "2 மட்டும் சரி", "இரண்டும் சரி", "இரண்டும் தவறு"], a:2, c:"Defence", d:"Easy", e:"சைக்ளோன் என்பது இந்தியா மற்றும் எகிப்து நாடுகளுக்கிடையேயான பயிற்சியாகும்.", t:"ராணுவ பயிற்சிகள்.", type:"stmt", stmts:["சைக்ளோன் பயிற்சி இந்தியா மற்றும் எகிப்து சிறப்பு படைகளுக்கு இடையேயானது.","இது பாலைவன போர் முறைகளை உள்ளடக்கியது."]},
  {q:"செங்கடலின் (Red Sea) எல்லை நாடுகள் குறித்து:", o:["1 மட்டும் சரி", "2 மட்டும் சரி", "இரண்டும் சரி", "இரண்டும் தவறு"], a:2, c:"International", d:"Hard", e:"எகிப்து, சூடான், எரித்திரியா, ஜிபூட்டி, சவுதி அரேபியா, ஏமன் ஆகியவை செங்கடலின் எல்லை நாடுகளாகும்.", t:"புவியியல் வரைபட அடிப்படையிலான கேள்விகள்.", type:"stmt", stmts:["எகிப்து, சூடான், எரித்திரியா ஆகியவை செங்கடலின் எல்லையில் உள்ளன.","சவுதி அரேபியா மற்றும் ஏமன் நாடுகளும் செங்கடல் எல்லையை கொண்டுள்ளன."]},
  {q:"கட்சி தாவல் தடை சட்டம் (Anti-Defection Law) குறித்து:", o:["1 மட்டும் சரி", "2 மட்டும் சரி", "இரண்டும் சரி", "இரண்டும் தவறு"], a:2, c:"Polity", d:"Easy", e:"1985 இல் கொண்டுவரப்பட்ட 52வது சட்டத்திருத்தம் மூலம் 10வது அட்டவணை சேர்க்கப்பட்டது.", t:"அரசியலமைப்பு திருத்தங்கள் Group 1-ல் கட்டாயம் கேட்கப்படும்.", type:"stmt", stmts:["இச்சட்டம் 52வது அரசியலமைப்பு திருத்தத்தின் மூலம் கொண்டுவரப்பட்டது.","இது அரசியலமைப்பின் 10வது அட்டவணையில் சேர்க்கப்பட்டுள்ளது."]},
  {q:"'நீர் முன்னணி' (Water Forward Initiative) திட்டம் பற்றி:", o:["1 மட்டும் சரி", "2 மட்டும் சரி", "இரண்டும் சரி", "இரண்டும் தவறு"], a:2, c:"Environment", d:"Medium", e:"உலக வங்கி நீர் பாதுகாப்பை உறுதி செய்வதற்காக இந்த முன்னெடுப்பை தொடங்கியுள்ளது.", t:"உலகளாவிய சுற்றுச்சூழல் திட்டங்கள்.", type:"stmt", stmts:["இத்திட்டத்தை உலக வங்கி தொடங்கியுள்ளது.","இதன் நோக்கம் உலகளாவிய நீர் பாதுகாப்பை உறுதி செய்வதாகும்."]},

const container = document.getElementById('mcq-container');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
let answeredCount = 0;

function createOption(optText, optIndex, qData, block, qBody) {
  const li = document.createElement('li');
  li.innerHTML = `<span class="opt-label">${String.fromCharCode(65 + optIndex)}</span><span class="opt-text">${optText}</span>`;
  
  li.addEventListener('click', () => {
    if (block.classList.contains('answered')) return;
    block.classList.add('answered');
    
    // Lock all options
    const allOpts = block.querySelectorAll('li');
    allOpts.forEach(o => o.classList.add('locked'));
    
    li.classList.add('selected');
    
    if (optIndex === qData.a) {
      li.classList.add('correct-ans');
    } else {
      li.classList.add('wrong-ans');
      allOpts[qData.a].classList.add('correct-ans');
    }
    
    // Auto open accordion
    qBody.classList.add('open');
    qBody.style.maxHeight = qBody.scrollHeight + "px";
    qBody.style.opacity = "1";
    
    const toggleBtn = block.querySelector('.toggle-btn');
    toggleBtn.classList.add('open');
    toggleBtn.innerHTML = `HIDE ANSWER <svg class="toggle-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
    
    answeredCount++;
    progressFill.style.width = `${(answeredCount / 100) * 100}%`;
    progressText.innerText = `Answered: ${answeredCount} / 100`;
  });
  
  return li;
}

rawData.forEach((q, idx) => {
  const block = document.createElement('div');
  block.className = q.type === 'stmt' ? 'stmt-mcq card-wrapper' : 'mcq-block card-wrapper';
  block.dataset.category = q.c;
  
  let html = `
    <div class="card-header">
      <div class="q-num">Q.${String(idx + 1).padStart(3, '0')}</div>
      <div class="tag-wrap">
        <div class="diff-dot diff-${q.d}"></div>
        <div class="cat-tag">${q.c}</div>
      </div>
    </div>
    <div class="mcq-q">${q.q}</div>
  `;
  
  if (q.type === 'stmt') {
    html += `<ul class="stmt-list">`;
    q.stmts.forEach((s, i) => { html += `<li data-n="${i+1}">${s}</li>`; });
    html += `</ul><div class="stmt-intro">மேற்கண்ட கூற்றுகளில் எது/எவை சரியானது?</div>`;
  }
  
  block.innerHTML = html;
  
  const optList = document.createElement('ul');
  optList.className = 'mcq-options';
  
  const qBody = document.createElement('div');
  qBody.className = 'q-body';
  
  let bodyHtml = `
    <span class="mcq-answer">✔ CORRECT ANSWER: ${String.fromCharCode(65 + q.a)} — ${q.o[q.a]}</span>
  `;
  if(q.type === 'stmt') {
    bodyHtml += `<div class="stmt-verdicts">Statement 1: <span class="v-cor">✓ Correct</span><br>Statement 2: <span class="v-cor">✓ Correct</span></div>`;
  }
  bodyHtml += `
    <div class="mcq-explain">${q.e}</div>
    <div class="tip-box">💡 Examiner's Tip: ${q.t}</div>
  `;
  qBody.innerHTML = bodyHtml;
  
  q.o.forEach((optText, optIndex) => {
    optList.appendChild(createOption(optText, optIndex, q, block, qBody));
  });
  
  block.appendChild(optList);
  
  const toggleBtn = document.createElement('button');
  toggleBtn.className = 'toggle-btn';
  toggleBtn.innerHTML = `REVEAL ANSWER <svg class="toggle-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
  
  toggleBtn.addEventListener('click', () => {
    if (qBody.classList.contains('open')) {
      qBody.classList.remove('open');
      qBody.style.maxHeight = "0px";
      qBody.style.opacity = "0";
      toggleBtn.classList.remove('open');
      toggleBtn.innerHTML = `REVEAL ANSWER <svg class="toggle-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
    } else {
      qBody.classList.add('open');
      qBody.style.maxHeight = qBody.scrollHeight + "px";
      qBody.style.opacity = "1";
      toggleBtn.classList.add('open');
      toggleBtn.innerHTML = `HIDE ANSWER <svg class="toggle-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
    }
  });
  
  block.appendChild(toggleBtn);
  block.appendChild(qBody);
  container.appendChild(block);
});

// Filter Navigation Logic
const filterNav = document.getElementById('filter-nav');
const pills = filterNav.querySelectorAll('.nav-pill');

filterNav.addEventListener('click', (e) => {
  if(e.target.classList.contains('nav-pill')) {
    pills.forEach(p => p.classList.remove('active'));
    e.target.classList.add('active');
    
    const filterVal = e.target.getAttribute('data-filter');
    const cards = document.querySelectorAll('.card-wrapper');
    
    cards.forEach(card => {
      if(filterVal === 'All') {
        card.style.display = 'block';
      } else if(card.dataset.category === filterVal || (filterVal === 'Schemes & Days' && (card.dataset.category === 'Schemes' || card.dataset.category === 'Days'))) {
        card.style.display = 'block';
      } else {
        card.style.display = 'none';
      }
    });
  }
});
</script>
