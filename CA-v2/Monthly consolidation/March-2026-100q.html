<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TNPSC 100 MCQs Current Affairs Drill</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Andika:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Orbitron:wght@500&family=Syne:wght@400;600;700;800&display=swap');

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e2a;
      --border: #242836;
      --gold: #f5c842;
      --gold-dim: #c9a230;
      --gold-glow: rgba(245, 200, 66, 0.08);
      --text: #e8e6df;
      --muted: #8a8a9a;
      --accent-blue: #5b8dee;
      --accent-green: #4caf7d;
      --accent-red: #e05c5c;
      --accent-purple: #9b72cf;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Andika', sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 80px;
    }

    h1,
    h2,
    h3,
    h4,
    .syne {
      font-family: 'Syne', sans-serif;
    }

    .mono {
      font-family: 'IBM Plex Mono', monospace;
    }

    /* TOPBAR */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .tnpsc-badge {
      background: var(--gold-glow);
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 4px 10px;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .topbar-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: var(--muted);
    }

    .topbar-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--gold-dim);
    }

    /* HERO SECTION */
    .hero {
      padding: 64px 24px;
      position: relative;
      overflow: hidden;
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--gold-glow) 0%, rgba(13, 15, 20, 0) 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 24px;
      line-height: 1.2;
    }

    .tag-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tag.gold {
      background: rgba(245, 200, 66, 0.1);
      color: var(--gold);
      border: 1px solid rgba(245, 200, 66, 0.3);
    }

    .tag.blue {
      background: rgba(91, 141, 238, 0.1);
      color: var(--accent-blue);
      border: 1px solid rgba(91, 141, 238, 0.3);
    }

    .tag.green {
      background: rgba(76, 175, 125, 0.1);
      color: var(--accent-green);
      border: 1px solid rgba(76, 175, 125, 0.3);
    }

    /* NAV PILLS */
    .nav-pills {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 12px;
    }

    .nav-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
    }

    .nav-pill:hover,
    .nav-pill.active {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-glow);
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto 32px;
      padding: 0 24px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--gold-dim);
      border-radius: 4px;
      padding: 12px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 150px;
    }

    .stat-val {
      color: var(--gold);
      font-size: 20px;
      font-weight: 600;
    }

    /* QUESTION GRID */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      border-left: 4px solid var(--gold);
      padding: 24px;
      position: relative;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .q-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: var(--gold);
      font-weight: 600;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .diff-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .cat-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 2px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
    }

    .mcq-q {
      font-size: 15px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 16px;
    }

    .stmt-intro {
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 12px;
    }

    ul.stmt-list {
      list-style: none;
      padding: 0;
      margin-bottom: 16px;
    }

    ul.stmt-list li {
      font-size: 14px;
      margin-bottom: 8px;
      display: flex;
      gap: 12px;
    }

    ul.stmt-list li::before {
      content: attr(data-n) '.';
      font-family: 'IBM Plex Mono', monospace;
      color: var(--gold);
    }

    ul.mcq-options {
      list-style: none;
      padding: 0;
    }

    ul.mcq-options li {
      margin-bottom: 8px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .card:not(.locked) ul.mcq-options li:hover {
      border-color: var(--gold);
      background: var(--gold-glow);
    }

    ul.mcq-options li.selected {
      border-color: var(--gold);
      background: var(--gold-glow);
    }

    ul.mcq-options li.correct {
      border-color: var(--accent-green) !important;
      background: rgba(76, 175, 125, 0.1) !important;
    }

    ul.mcq-options li.incorrect {
      border-color: var(--accent-red) !important;
      background: rgba(224, 92, 92, 0.1) !important;
    }

    .opt-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    .opt-text {
      font-size: 14px;
    }

    .card.locked ul.mcq-options li {
      pointer-events: none;
    }

    /* ACCORDION */
    .toggle-btn {
      border: 1.5px solid var(--gold);
      background: transparent;
      color: var(--gold);
      border-radius: 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 18px;
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle-btn:hover {
      background: var(--gold-glow);
    }

    .toggle-btn svg {
      width: 12px;
      height: 12px;
      transition: transform 0.3s ease;
    }

    .toggle-btn.active svg {
      transform: rotate(180deg);
    }

    .q-body {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.25s ease;
      margin-top: 16px;
      background: var(--surface2);
      border-left: 3px solid var(--gold);
      border-radius: 4px;
      padding: 0 16px;
    }

    .q-body.open {
      padding: 14px 16px;
    }

    .mcq-answer {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--accent-green);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      display: block;
      font-weight: 600;
    }

    .mcq-explain {
      font-size: 14px;
      color: var(--text);
      line-height: 1.8;
      margin-bottom: 12px;
    }

    .examiner-tip {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--gold);
      background: var(--gold-glow);
      border-left: 2px solid var(--gold);
      padding: 8px 12px;
      margin-top: 8px;
    }

    /* PROGRESS BAR */
    .progress-strip {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--gold);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      z-index: 100;
    }

    .prog-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--gold);
      white-space: nowrap;
    }

    .prog-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      width: 0%;
      background: var(--gold);
      transition: width 0.3s ease;
    }

    @media (max-width: 680px) {
      .topbar-title {
        display: none;
      }

      .hero h1 {
        font-size: 32px;
      }

      .stats-bar {
        flex-direction: column;
      }
    }
  

/* Custom Scrollbar Styles */
/* For Modern Browsers (Firefox 64+) */
* {
    scrollbar-width: thin;
    scrollbar-color: #f5c842 transparent;
}

/* For WebKit Browsers (Chrome, Safari, Edge) */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: transparent; /* Makes the track invisible */
}

::-webkit-scrollbar-thumb {
    background-color: #f5c842; /* Gold/Yellow thumb */
    border-radius: 20px;       /* Rounded edges for the thumb */
}

::-webkit-scrollbar-thumb:hover {
    background-color: #e0b32f; /* Darker gold on hover */
}

</style>
</head>

  <main id="q-grid"></main>

  <div class="progress-strip">

      { id: 4, isStmt: false, cat: "Economy", diff: "medium", q: "Where was India's first semiconductor ATMP plant inaugurated?", stmt: [], opts: ["A|Karnataka", "B|Gujarat", "C|Tamil Nadu", "D|Maharashtra"], ans: "B", exp: "India's first semiconductor ATMP (Assembly, Testing, Marking, and Packaging) plant was inaugurated in Gujarat.", tip: "ATMP plants are a critical step towards India's self-reliance in chip manufacturing." },
      { id: 5, isStmt: false, cat: "International", diff: "medium", q: "Where will the India-France National Centre of Excellence be set up?", stmt: [], opts: ["A|New Delhi", "B|Maharashtra", "C|Uttar Pradesh", "D|Puducherry"], ans: "C", exp: "The India-France National Centre of Excellence is slated to be established in Uttar Pradesh.", tip: "Bilateral CoEs usually focus on sustainable development and technology transfer." },
      { id: 6, isStmt: false, cat: "Polity", diff: "hard", q: "Which committee is associated with the operations and regulations of DigiLocker?", stmt: [], opts: ["A|Srikrishna Committee", "B|Ajay Sahni Committee", "C|Rao Committee", "D|Kasturirangan Committee"], ans: "B", exp: "The Ajay Sahni Committee was constituted to oversee matters related to the DigiLocker ecosystem.", tip: "DigiLocker falls under the Digital India initiative." },
      { id: 7, isStmt: true, cat: "National", diff: "easy", q: "Consider the following statements regarding Important Days:", stmt: ["Civil Accounts Day is observed on March 1.", "It marks the foundation of the Indian Civil Accounts Service (ICAS)."], opts: ["A|1 only", "B|2 only", "C|Both 1 and 2", "D|Neither 1 nor 2"], ans: "C", exp: "Civil Accounts Day is observed annually on March 1 to commemorate the creation of the Indian Civil Accounts Service.", tip: "ICAS functions under the Department of Expenditure." },
      { id: 8, isStmt: false, cat: "TN Affairs", diff: "medium", q: "Where was Tamil Nadu's first Dark Sky Park inaugurated?", stmt: [], opts: ["A|Kodaikanal", "B|Kolli Hills", "C|Yelagiri", "D|Ooty"], ans: "B", exp: "Tamil Nadu's first Dark Sky Park was inaugurated at Kolli Hills to promote astrotourism and reduce light pollution.", tip: "Dark Sky Parks are essential for astronomical observations." },
      { id: 9, isStmt: false, cat: "Polity", diff: "medium", q: "Which Union Ministry launched the 'Rajmarg Pravesh' web portal?", stmt: [], opts: ["A|Ministry of Home Affairs", "B|Ministry of Road Transport and Highways", "C|Ministry of Rural Development", "D|Ministry of Railways"], ans: "B", exp: "The Ministry of Road Transport and Highways launched the 'Rajmarg Pravesh' portal to streamline highway access permissions.", tip: "Digital portals ensure transparency in infrastructure projects." },
      { id: 10, isStmt: false, cat: "International", diff: "hard", q: "The Amondawa tribes, recently in the news, belong to which country?", stmt: [], opts: ["A|Peru", "B|Colombia", "C|Brazil", "D|Venezuela"], ans: "C", exp: "The Amondawa are an indigenous tribal group residing in the Amazon basin of Brazil.", tip: "Tribes in the Amazon face threats from deforestation and illegal mining." },
      { id: 11, isStmt: false, cat: "Environment", diff: "easy", q: "On which day is World Wildlife Day observed globally?", stmt: [], opts: ["A|March 1", "B|March 3", "C|March 5", "D|March 10"], ans: "B", exp: "World Wildlife Day is observed on March 3 to celebrate and raise awareness about the world's wild animals and plants.", tip: "March 3 marks the adoption of CITES in 1973." },

      { id: 14, isStmt: false, cat: "Environment", diff: "medium", q: "Which city created a record for the largest mega plantation campaign?", stmt: [], opts: ["A|Indore", "B|Varanasi", "C|Surat", "D|Bhopal"], ans: "B", exp: "Varanasi established a new record by successfully executing a mega sapling plantation campaign.", tip: "Urban afforestation aligns with the Nagar Van Yojana objectives." },
      { id: 15, isStmt: false, cat: "Science", diff: "easy", q: "Where was the Mobile World Congress (MWC) 2026 held?", stmt: [], opts: ["A|USA", "B|Germany", "C|Spain", "D|France"], ans: "C", exp: "The Mobile World Congress 2026, the premier event for the connectivity industry, was hosted in Spain (Barcelona).", tip: "MWC is the largest annual gathering for the telecom sector." },

      { id: 18, isStmt: false, cat: "TN Affairs", diff: "medium", q: "What is the prize money associated with the prestigious 'Kalaichemmal Award' in Tamil Nadu?", stmt: [], opts: ["A|₹ 50,000", "B|₹ 1 Lakh", "C|₹ 2 Lakhs", "D|₹ 5 Lakhs"], ans: "B", exp: "The Kalaichemmal Award carries a cash prize of ₹ 1 Lakh, honoring exceptional contributions to arts.", tip: "Awards for arts and literature reflect state patronage of cultural heritage." },
      { id: 19, isStmt: false, cat: "Economy", diff: "medium", q: "Which state exported its GI-tagged 'Karbi Anglong Ginger' to London?", stmt: [], opts: ["A|Assam", "B|Meghalaya", "C|Manipur", "D|Nagaland"], ans: "A", exp: "Assam successfully flagged off the export consignment of its geographically indicated Karbi Anglong Ginger to London.", tip: "GI tags help in premium pricing for agricultural exports." },
      { id: 20, isStmt: false, cat: "National", diff: "hard", q: "Who is the author of the book 'Mahatma: A Great Communicator'?", stmt: [], opts: ["A|Ramachandra Guha", "B|Dheeraj Kakadia", "C|Shashi Tharoor", "D|Gopalkrishna Gandhi"], ans: "B", exp: "The book 'Mahatma: A Great Communicator' was authored by Dheeraj Kakadia.", tip: "Books on Gandhi frequently explore his unmatched mass mobilization skills." },
      { id: 21, isStmt: false, cat: "TN Affairs", diff: "medium", q: "Where was an Olympic Academy inaugurated recently in Tamil Nadu?", stmt: [], opts: ["A|Chennai", "B|Madurai", "C|Nilgiris", "D|Coimbatore"], ans: "C", exp: "A dedicated Olympic Academy was recently inaugurated in the Nilgiris district to foster high-altitude sports training.", tip: "High-altitude training improves cardiovascular endurance for athletes." },

    function renderQuestions(filter) {
      const grid = document.getElementById('q-grid');
      let html = '';

      qData.forEach(q => {
        if (filter !== 'All' && q.cat !== filter) return;

        let isStmt = q.isStmt;
        let wrapperClass = isStmt ? "stmt-mcq card" : "mcq-block card";
        let stmtHtml = "";
        if (isStmt) {
          stmtHtml = `<div class="stmt-intro">Which of the statements given above is/are correct?</div><ul class="stmt-list">`;
          q.stmt.forEach((s, i) => { stmtHtml += `<li data-n="${i + 1}">${s}</li>`; });
          stmtHtml += `</ul>`;
        }

        let optsHtml = `<ul class="mcq-options">`;
        q.opts.forEach(o => {
          let parts = o.split('|');
          let label = parts[0]; let text = parts[1];
          optsHtml += `<li data-opt="${label}"><span class="opt-label">${label}</span><span class="opt-text">${text}</span></li>`;
        });
        optsHtml += `</ul>`;

        let diffColor = q.diff === 'easy' ? 'var(--accent-green)' : (q.diff === 'medium' ? 'var(--gold)' : 'var(--accent-red)');

        html += `
    <div class="${wrapperClass}" data-category="${q.cat}" data-id="${q.id}">
      <div class="card-header">
        <div class="q-num">Q.${String(q.id).padStart(3, '0')}</div>
        <div class="card-meta">
          <span class="diff-dot" style="background:${diffColor}"></span>
          <span class="cat-tag">${q.cat}</span>
        </div>
      </div>
      <div class="mcq-q">${q.q}</div>
      ${stmtHtml}
      ${optsHtml}
      <button class="toggle-btn" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        <span>REVEAL ANSWER</span>
      </button>
      <div class="q-body">
         <div class="mcq-answer" data-ans="${q.ans}">✔ CORRECT ANSWER: ${q.ans}</div>
         <div class="mcq-explain">${q.exp}</div>
         <div class="examiner-tip"><strong>Examiner's Tip:</strong> ${q.tip}</div>
      </div>
    </div>
    `;
      });
      grid.innerHTML = html;
      updateProgress();
    }

    function updateProgress() {
      let total = document.querySelectorAll('#q-grid .card').length;
      let answered = document.querySelectorAll('#q-grid .card[data-answered="true"]').length;
      document.getElementById('progress-text').textContent = `Answered: ${answered} / ${total}`;
      document.getElementById('progress-fill').style.width = total > 0 ? `${(answered / total) * 100}%` : '0%';
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderQuestions('All');

      // Filter Logic
      document.getElementById('filter-nav').addEventListener('click', (e) => {
        if (e.target.classList.contains('nav-pill')) {
          document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
          e.target.classList.add('active');
          renderQuestions(e.target.dataset.filter);
        }
      });

      // Interaction Logic (Event Delegation)
      document.getElementById('q-grid').addEventListener('click', (e) => {
        // Option Click
        let li = e.target.closest('.mcq-options li');
        if (li) {
          let card = li.closest('.card');
          if (card.dataset.answered === "true") return;
          card.dataset.answered = "true";
          card.classList.add('locked');

          let selectedOpt = li.dataset.opt;
          let qBody = card.querySelector('.q-body');
          let answerDiv = qBody.querySelector('.mcq-answer');
          let correctOpt = answerDiv.dataset.ans;

          card.querySelectorAll('.mcq-options li').forEach(item => {
            if (item.dataset.opt === correctOpt) item.classList.add('correct');
          });

          if (selectedOpt === correctOpt) {
            li.classList.add('selected', 'correct');
          } else {
            li.classList.add('selected', 'incorrect');
          }

          let toggleBtn = card.querySelector('.toggle-btn');
          toggleBtn.style.display = 'flex';
          toggleBtn.classList.add('active');
          toggleBtn.querySelector('span').textContent = 'HIDE ANSWER';
          qBody.classList.add('open');
          qBody.style.maxHeight = qBody.scrollHeight + "px";
          qBody.style.opacity = "1";

          updateProgress();
          return;
        }

        // Toggle Button Click
        let btn = e.target.closest('.toggle-btn');
        if (btn) {
          let card = btn.closest('.card');
          let qBody = card.querySelector('.q-body');
          if (btn.classList.contains('active')) {
            qBody.style.maxHeight = '0px';
            qBody.style.opacity = '0';
            qBody.classList.remove('open');
            btn.classList.remove('active');
            btn.querySelector('span').textContent = 'REVEAL ANSWER';
          } else {
            qBody.classList.add('open');
            qBody.style.maxHeight = qBody.scrollHeight + "px";
            qBody.style.opacity = "1";
            btn.classList.add('active');
            btn.querySelector('span').textContent = 'HIDE ANSWER';
          }
        }
      });
    });
  </script>
