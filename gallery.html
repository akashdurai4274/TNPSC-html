<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arivoam — Study Gallery</title>
  <link rel="stylesheet" href="arivoam-shared.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 200;
      flex-shrink: 0;
    }
    .topbar-logo {
      font-family: var(--font-h);
      font-size: 1rem;
      font-weight: 800;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .topbar-sep { color: var(--border2); font-size: 1.1rem; user-select: none; }
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-m);
      font-size: 0.68rem;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }
    .bc-item {
      color: var(--muted);
      cursor: pointer;
      transition: color .15s;
      white-space: nowrap;
    }
    .bc-item:hover { color: var(--gold); }
    .bc-item.active { color: var(--text); cursor: default; }
    .bc-sep { color: var(--border2); flex-shrink: 0; }
    .topbar-btn {
      margin-left: auto;
      font-family: var(--font-m);
      font-size: 0.62rem;
      background: var(--gold);
      color: var(--bg);
      border: none;
      padding: 6px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 700;
      transition: all .2s;
      letter-spacing: .4px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .topbar-btn:hover { background: var(--gold2); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(245,200,66,.3); }

    /* ── HERO (subjects view) ── */
    .g-hero {
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      padding: 36px 24px 26px;
      position: relative;
      overflow: hidden;
    }
    .g-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, var(--gold-glow) 0%, transparent 70%);
      pointer-events: none;
    }
    .g-hero-inner { max-width: 1100px; margin: 0 auto; position: relative; }
    .g-title {
      font-family: var(--font-h);
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 800;
      background: linear-gradient(90deg, #f5c842, #ffe88a, #f5c842);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .g-sub {
      font-family: var(--font-m);
      font-size: 0.69rem;
      color: var(--muted2);
      margin-top: 7px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .g-stats {
      display: flex;
      gap: 22px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .g-stat-v { font-family: var(--font-n); font-size: 1.4rem; color: var(--gold); line-height: 1; }
    .g-stat-l { font-family: var(--font-m); font-size: 0.58rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    /* ── TOOLBAR ── */
    .g-toolbar {
      padding: 12px 24px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .g-toolbar-inner { max-width: 1100px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 10px; }
    .srch-wrap { position: relative; flex: 1; min-width: 180px; max-width: 380px; }
    .srch-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.78rem; pointer-events: none; }
    .srch-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-m);
      font-size: 0.7rem;
      padding: 7px 10px 7px 30px;
      outline: none;
      transition: border-color .2s;
    }
    .srch-input:focus { border-color: var(--gold); }
    .srch-input::placeholder { color: var(--muted); }

    /* ── MAIN ── */
    .g-main {
      flex: 1;
      padding: 28px 24px 72px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }
    .g-section-head {
      font-family: var(--font-h);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .g-count {
      font-family: var(--font-n);
      font-size: 0.57rem;
      color: var(--muted);
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* ── SUBJECT CARDS ── */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .subj-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent, #f5c842);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .18s;
      position: relative;
      overflow: hidden;
    }
    .subj-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,.35); }
    .subj-card-icon { font-size: 2rem; line-height: 1; margin-bottom: 10px; display: block; }
    .subj-card-name { font-family: var(--font-h); font-size: 1rem; font-weight: 700; color: var(--text); }
    .subj-card-meta { display: flex; gap: 12px; margin-top: 10px; }
    .subj-meta-chip { font-family: var(--font-m); font-size: 0.6rem; color: var(--muted); }
    .subj-meta-chip strong { font-family: var(--font-n); font-size: 0.72rem; margin-right: 3px; }
    .card-actions {
      position: absolute; top: 10px; right: 10px;
      display: flex; gap: 3px;
      opacity: 0; transition: opacity .15s;
    }
    .subj-card:hover .card-actions,
    .topic-card:hover .card-actions { opacity: 1; }
    .ic-btn {
      width: 26px; height: 26px;
      border-radius: 4px; border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem;
      transition: all .15s;
    }
    .ic-btn-ed { background: var(--bg3); color: var(--muted2); }
    .ic-btn-ed:hover { background: var(--border2); color: var(--text); }
    .ic-btn-dl { background: rgba(239,68,68,.1); color: var(--red); }
    .ic-btn-dl:hover { background: rgba(239,68,68,.22); }

    /* ── TOPIC CARDS ── */
    .topics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
    }
    .topic-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent, #f5c842);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .15s, transform .15s;
      position: relative;
    }
    .topic-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.3); }
    .topic-label { font-family: var(--font-m); font-size: 0.56rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
    .topic-name { font-family: var(--font-h); font-size: 0.88rem; font-weight: 600; color: var(--text); line-height: 1.3; }
    .topic-count { font-family: var(--font-n); font-size: 1.1rem; margin-top: 12px; }
    .topic-count-l { font-family: var(--font-m); font-size: 0.56rem; color: var(--muted); letter-spacing: .5px; }

    /* ── IMAGE CARDS ── */
    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .img-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
      position: relative;
    }
    .img-card:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(0,0,0,.4); }
    .img-thumb-wrap {
      width: 100%; aspect-ratio: 4/3;
      overflow: hidden; background: var(--bg3); position: relative;
    }
    .img-thumb { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; display: block; }
    .img-card:hover .img-thumb { transform: scale(1.05); }
    .img-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      opacity: 0; transition: opacity .2s;
    }
    .img-card:hover .img-overlay { opacity: 1; }
    .img-info { padding: 9px 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
    .img-name { font-family: var(--font-h); font-size: 0.78rem; font-weight: 600; color: var(--text); line-height: 1.3; flex: 1; }
    .img-date { font-family: var(--font-m); font-size: 0.55rem; color: var(--muted); flex-shrink: 0; padding-top: 1px; }
    .img-actions { padding: 0 10px 10px; display: flex; gap: 4px; }

    /* ── ADD / UPLOAD PLACEHOLDER CARD ── */
    .add-ph {
      background: transparent;
      border: 2px dashed var(--border2);
      border-radius: 8px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; cursor: pointer;
      transition: all .2s;
      padding: 24px;
      color: var(--muted);
      font-family: var(--font-m);
      font-size: 0.63rem;
      letter-spacing: .5px;
      aspect-ratio: 4/3;
    }
    .add-ph.tall { aspect-ratio: unset; min-height: 110px; }
    .add-ph:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }
    .add-ph-icon { font-size: 1.6rem; line-height: 1; }

    /* ── SMALL BUTTONS ── */
    .btn { font-family: var(--font-m); font-size: 0.63rem; padding: 6px 13px; border-radius: 5px; border: none; cursor: pointer; transition: all .2s; letter-spacing: .4px; }
    .btn-pr { background: var(--gold); color: var(--bg); font-weight: 700; }
    .btn-pr:hover { background: var(--gold2); }
    .btn-ou { background: transparent; color: var(--muted2); border: 1px solid var(--border); }
    .btn-ou:hover { border-color: var(--gold); color: var(--gold); }
    .btn-dk { background: rgba(239,68,68,.1); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
    .btn-dk:hover { background: rgba(239,68,68,.2); }
    .btn-sm { padding: 4px 10px; font-size: 0.58rem; border-radius: 4px; }
    .btn-icon { padding: 5px 10px; font-size: 0.7rem; background: rgba(255,255,255,.08); color: white; border: none; border-radius: 4px; cursor: pointer; transition: background .15s; }
    .btn-icon:hover { background: rgba(255,255,255,.18); }

    /* ── MODAL ── */
    .modal-ov {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.72);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      backdrop-filter: blur(4px);
    }
    .modal-ov.hidden { display: none; }
    .modal-box {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 26px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,.65);
    }
    .modal-title { font-family: var(--font-h); font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .modal-sub { font-family: var(--font-m); font-size: 0.63rem; color: var(--muted); letter-spacing: .3px; margin-bottom: 20px; }
    .form-grp { margin-bottom: 14px; }
    .form-lbl { font-family: var(--font-m); font-size: 0.6rem; color: var(--muted2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }
    .form-inp {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-b);
      font-size: 0.86rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color .2s;
    }
    .form-inp:focus { border-color: var(--gold); }
    .form-inp::placeholder { color: var(--muted); }
    .clr-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .clr-sw {
      width: 30px; height: 30px;
      border-radius: 50%; cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .15s, transform .12s;
    }
    .clr-sw:hover, .clr-sw.active { border-color: white; transform: scale(1.12); }
    .icon-row2 { display: flex; gap: 7px; flex-wrap: wrap; }
    .ic-sel {
      width: 40px; height: 40px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      transition: all .15s;
    }
    .ic-sel:hover { border-color: var(--gold); background: var(--gold-glow); }
    .ic-sel.active { border-color: var(--gold); background: var(--gold-dim); }
    .upload-z {
      border: 2px dashed var(--border2);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      position: relative;
    }
    .upload-z:hover { border-color: var(--gold); background: var(--gold-glow); }
    .upload-z input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-z-icon { font-size: 1.8rem; margin-bottom: 6px; }
    .upload-z-txt { font-family: var(--font-m); font-size: 0.66rem; color: var(--muted2); }
    .upload-prev { display: none; margin-top: 10px; border-radius: 6px; overflow: hidden; }
    .upload-prev img { width: 100%; max-height: 160px; object-fit: cover; display: block; }
    .modal-acts { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }

    /* ── CAMERA CAPTURE ── */
    .src-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    .src-tab {
      flex: 1; font-family: var(--font-m); font-size: 0.62rem; padding: 7px 10px;
      border-radius: 6px; border: 1px solid var(--border); background: var(--bg);
      color: var(--muted2); cursor: pointer; transition: all .18s; text-align: center;
    }
    .src-tab.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
    .cam-wrap {
      display: none; position: relative; border-radius: 8px; overflow: hidden;
      background: #000; aspect-ratio: 4/3;
    }
    .cam-wrap.live { display: block; }
    .cam-video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cam-snap {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,.95); border: none; border-radius: 50%;
      width: 54px; height: 54px; font-size: 1.4rem; cursor: pointer;
      box-shadow: 0 3px 14px rgba(0,0,0,.5); transition: transform .15s, box-shadow .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .cam-snap:hover { transform: translateX(-50%) scale(1.08); box-shadow: 0 4px 20px rgba(0,0,0,.6); }
    .cam-flip {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,.45); border: none; border-radius: 50%;
      width: 36px; height: 36px; font-size: 1rem; cursor: pointer; color: white;
      display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .cam-flip:hover { background: rgba(0,0,0,.7); }
    .cam-err { padding: 20px; text-align: center; font-family: var(--font-m); font-size: 0.65rem; color: var(--red); }
    #retakeBtn { margin-top: 8px; font-size: 0.6rem; padding: 5px 12px; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,.93);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      backdrop-filter: blur(6px);
    }
    .lightbox.hidden { display: none; }
    .lb-img { max-width: 100%; max-height: 85vh; border-radius: 8px; box-shadow: 0 20px 80px rgba(0,0,0,.8); }
    .lb-close {
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,.1); border: none; border-radius: 50%;
      width: 38px; height: 38px; color: white; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .lb-close:hover { background: rgba(255,255,255,.2); }
    .lb-cap {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-m); font-size: 0.68rem; color: rgba(255,255,255,.75);
      background: rgba(0,0,0,.55); padding: 5px 16px; border-radius: 20px; letter-spacing: .5px;
      white-space: nowrap; max-width: 90%; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── EMPTY STATE ── */
    .empty-st { text-align: center; padding: 56px 20px; }
    .empty-ico { font-size: 2.8rem; margin-bottom: 10px; }
    .empty-ttl { font-family: var(--font-h); font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-sub { font-family: var(--font-m); font-size: 0.66rem; color: var(--muted); margin-bottom: 22px; line-height: 1.6; }

    @media (max-width: 640px) {
      .g-main { padding: 18px 14px 56px; }
      .g-hero { padding: 24px 14px 18px; }
      .g-toolbar { padding: 10px 14px; }
      .topbar { padding: 0 14px; }
      .subjects-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
      .images-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
      .topics-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <a href="index.html" class="topbar-logo">ARIVOAM</a>
  <span class="topbar-sep">|</span>
  <nav class="breadcrumb" id="breadcrumb"></nav>
  <button class="topbar-btn" id="addBtn">+ Add Subject</button>
</header>

<!-- HERO (shown on subjects view) -->
<div class="g-hero" id="gHero">
  <div class="g-hero-inner">
    <div class="g-title">Study Image Gallery</div>
    <div class="g-sub">Educational Materials · Notes · Diagrams · Charts</div>
    <div class="g-stats" id="gStats"></div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="g-toolbar">
  <div class="g-toolbar-inner">
    <div class="srch-wrap">
      <span class="srch-icon">🔍</span>
      <input type="text" class="srch-input" id="srchInput" placeholder="Search…" oninput="handleSearch()">
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<main class="g-main" id="gMain"></main>

<!-- LIGHTBOX -->
<div class="lightbox hidden" id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <img class="lb-img" id="lbImg" src="" alt="">
  <div class="lb-cap" id="lbCap"></div>
</div>

<!-- MODAL -->
<div class="modal-ov hidden" id="modalOv">
  <div class="modal-box" id="modalBox"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   ARIVOAM GALLERY  —  localStorage-backed CRUD, 3-level nav
═══════════════════════════════════════════════════════ */

const LS_KEY = 'arivoam_gallery_v3';
const ACCENTS = ['#a855f7','#3b82f6','#22c55e','#f5c842','#ef4444','#fb923c','#22d3ee','#e879f9'];
const ICONS   = ['📚','⚖️','🏛️','🌍','🔬','💰','📐','🧪','📖','🔭','🗺️','🧬'];

/* uuid — regular function so it's hoisted */
function uuid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* ── SVG placeholder generator ── */
function makeSVG(label, accent) {
  const lines = label.match(/.{1,22}/g) || [label];
  const lineY = 175 - (lines.length - 1) * 12;
  const linesHTML = lines.map((l, i) =>
    `<text x="200" y="${lineY + i * 26}" font-family="serif" font-size="15" fill="${accent}" text-anchor="middle">${l}</text>`
  ).join('');
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300">
    <rect width="400" height="300" fill="#0d0f14"/>
    <rect width="4" height="300" fill="${accent}"/>
    <rect x="0" y="0" width="400" height="50" fill="#13161e"/>
    <text x="200" y="32" font-family="monospace" font-size="10" fill="${accent}" text-anchor="middle" letter-spacing="2">ARIVOAM STUDY NOTES</text>
    ${linesHTML}
    <rect x="0" y="270" width="400" height="30" fill="#13161e"/>
    <text x="200" y="289" font-family="monospace" font-size="9" fill="#6b7599" text-anchor="middle">arivoam.in · TNPSC &amp; SSC 2026</text>
  </svg>`;
  return 'data:image/svg+xml,' + encodeURIComponent(svg);
}

/* ── Build mock image entry ── */
function mkImg(name, accent) {
  return { id: uuid(), name, src: makeSVG(name, accent), date: '2026-05-' + String(Math.ceil(Math.random()*28)).padStart(2,'0') };
}

/* ── Initial mock data ── */
function buildMockData() {
  return {

/* ══════════════════ STATE ══════════════════ */
let st   = { view: 'subjects', sid: null, tid: null };
let data = { subjects: [] };
let pick = { accent: ACCENTS[0], icon: ICONS[0], file: null, capturedUrl: null };
let q    = '';
let camStream = null;
let camFacing = 'environment';

function save() { localStorage.setItem(LS_KEY, JSON.stringify(data)); }
function load() {
  try {
    const r = localStorage.getItem(LS_KEY);
    if (r) { data = JSON.parse(r); return; }
  } catch(e) {}
  data = buildMockData();
  save();
}
function getS(id) { return data.subjects.find(s => s.id === id); }
function getT(sid, tid) { const s = getS(sid); return s ? s.topics.find(t => t.id === tid) : null; }
function totalImgs() { return data.subjects.reduce((a,s) => a + s.topics.reduce((b,t) => b + t.images.length, 0), 0); }
function totalTopics() { return data.subjects.reduce((a,s) => a + s.topics.length, 0); }

/* ══════════════════ RENDER ══════════════════ */
function render() {
  renderBreadcrumb();
  renderHero();
  renderBtn();
  const el = document.getElementById('gMain');
  if (st.view === 'subjects') el.innerHTML = renderSubjects();
  else if (st.view === 'topics') el.innerHTML = renderTopics();
  else el.innerHTML = renderImages();
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let h = `<span class="bc-item${st.view==='subjects'?' active':''}" onclick="go('subjects')">Gallery</span>`;
  if (st.sid) {
    const s = getS(st.sid);
    if (s) {
      h += `<span class="bc-sep">›</span>`;
      h += `<span class="bc-item${st.view==='topics'?' active':''}" onclick="go('topics','${s.id}')">${s.name}</span>`;
    }
  }
  if (st.tid) {
    const t = getT(st.sid, st.tid);
    if (t) h += `<span class="bc-sep">›</span><span class="bc-item active">${t.name}</span>`;
  }
  bc.innerHTML = h;
}

function renderHero() {
  const h = document.getElementById('gHero');
  if (st.view !== 'subjects') { h.style.display = 'none'; return; }
  h.style.display = '';
  document.getElementById('gStats').innerHTML = `
    <div><div class="g-stat-v">${data.subjects.length}</div><div class="g-stat-l">Subjects</div></div>
    <div><div class="g-stat-v">${totalTopics()}</div><div class="g-stat-l">Topics</div></div>
    <div><div class="g-stat-v">${totalImgs()}</div><div class="g-stat-l">Images</div></div>

}

function renderBtn() {
  const b = document.getElementById('addBtn');

  else if (st.view === 'topics') { b.textContent = '+ Add Topic'; b.onclick = () => openAddTopic(); }

/* ══════════════════ CAMERA ══════════════════ */
function stopCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  const v = document.getElementById('camVideo');
  if (v) v.srcObject = null;
}

async function startCamera() {
  const wrap = document.getElementById('camWrap');
  const v    = document.getElementById('camVideo');
  if (!wrap || !v) return;
  stopCamera();
  wrap.innerHTML = `<video id="camVideo" class="cam-video" autoplay playsinline muted></video>
    <button class="cam-snap" onclick="capturePhoto()" title="Take photo">📸</button>
    <button class="cam-flip" onclick="flipCamera()" title="Flip camera">🔄</button>`;
  const video = document.getElementById('camVideo');
  try {
    const constraints = { video: { facingMode: { ideal: camFacing }, width:{ideal:1280}, height:{ideal:720} } };
    camStream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = camStream;
    await video.play();
  } catch (err) {
    wrap.innerHTML = `<div class="cam-err">📷 Camera access denied.<br><small>${err.message}</small></div>`;
  }
}

window.flipCamera = async function () {
  camFacing = camFacing === 'environment' ? 'user' : 'environment';
  await startCamera();
};

window.capturePhoto = function () {
  const video = document.getElementById('camVideo');
  if (!video || !video.videoWidth) return;
  const canvas = document.createElement('canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const url = canvas.toDataURL('image/jpeg', 0.88);
  pick.capturedUrl = url;
  pick.file = null;
  stopCamera();
  /* Show preview, hide camera */
  const wrap = document.getElementById('camWrap');
  if (wrap) wrap.classList.remove('live');
  document.getElementById('upPrevImg').src = url;
  document.getElementById('upPrev').style.display = 'block';
  const retake = document.getElementById('retakeBtn');
  if (retake) retake.style.display = 'inline-block';
};

window.retakePhoto = async function () {
  pick.capturedUrl = null;
  document.getElementById('upPrev').style.display = 'none';
  const retake = document.getElementById('retakeBtn');
  if (retake) retake.style.display = 'none';
  const wrap = document.getElementById('camWrap');
  if (wrap) wrap.classList.add('live');
  await startCamera();
};

window.setUploadMode = async function (mode) {
  document.querySelectorAll('.src-tab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  const zone = document.getElementById('upZone');
  const wrap = document.getElementById('camWrap');
  if (mode === 'file') {
    stopCamera();
    pick.capturedUrl = null;
    if (zone) zone.style.display = '';
    if (wrap) { wrap.classList.remove('live'); }
    document.getElementById('upPrev').style.display = 'none';
    const retake = document.getElementById('retakeBtn');
    if (retake) retake.style.display = 'none';
  } else {
    if (zone) zone.style.display = 'none';
    if (wrap) { wrap.classList.add('live'); await startCamera(); }
  }
};

        <button class="src-tab" data-mode="cam" onclick="setUploadMode('cam')">📷 Live Camera</button>
      </div>
      <!-- File upload zone -->
      <div class="upload-z" id="upZone">
        <input type="file" accept="image/*" capture="environment" id="fileInp" onchange="handleFile(event)">
        <div class="upload-z-icon">📤</div>
        <div class="upload-z-txt">Tap to choose · JPG, PNG, SVG, WebP</div>
      </div>
      <!-- Camera view -->
      <div class="cam-wrap" id="camWrap">
        <video id="camVideo" class="cam-video" autoplay playsinline muted></video>
        <button class="cam-snap" onclick="capturePhoto()" title="Take photo">📸</button>
        <button class="cam-flip" onclick="flipCamera()" title="Flip">🔄</button>
      </div>
      <!-- Preview -->
      <div class="upload-prev" id="upPrev"><img id="upPrevImg" src="" alt="preview"></div>
      <button id="retakeBtn" class="btn btn-ou" onclick="retakePhoto()" style="display:none;margin-top:8px;font-size:0.6rem;padding:5px 12px;">↩ Retake</button>
    </div>
    <div class="modal-acts">
      <button class="btn btn-ou" onclick="closeModal()">Cancel</button>
      <button class="btn btn-pr" onclick="doUpload()">Add Image</button>
    </div>`);
}

function handleFile(e) {
  const f = e.target.files[0]; if (!f) return;
  pick.file = f; pick.capturedUrl = null;
  const r = new FileReader();
  r.onload = ev => {
    document.getElementById('upPrevImg').src = ev.target.result;
    document.getElementById('upPrev').style.display = 'block';
    if (!document.getElementById('mInp').value)
      document.getElementById('mInp').value = f.name.replace(/\.[^/.]+$/,'').replace(/[-_]/g,' ');
  };
  r.readAsDataURL(f);
}

function doUpload() {
  const n = (document.getElementById('mInp').value || '').trim();
  const t = getT(st.sid, st.tid);
  if (!t || !n) {
    const inp = document.getElementById('mInp');
    if (inp) { inp.focus(); inp.style.borderColor='var(--red)'; setTimeout(()=>inp.style.borderColor='',1500); }
    return;
  }
  const entry = { id: uuid(), name: n, date: new Date().toISOString().slice(0,10) };
  if (pick.capturedUrl) {
    entry.src = pick.capturedUrl;
    t.images.push(entry); save(); stopCamera(); closeModal(); render();
  } else if (pick.file) {
    const r = new FileReader();
    r.onload = ev => { entry.src = ev.target.result; t.images.push(entry); save(); closeModal(); render(); };
    r.readAsDataURL(pick.file);
  } else {
    const upZone = document.getElementById('upZone');
    if (upZone) { upZone.style.borderColor='var(--red)'; setTimeout(()=>upZone.style.borderColor='',1500); }
  }
}

  openModal(`

  const t = getT(st.sid, st.tid);
  const img = t && t.images.find(i => i.id === imgId);
  const v = document.getElementById('mInp').value.trim();
  if (img && v) { img.name = v; save(); closeModal(); render(); }
}

/* ── Delete (universal) ── */
function confirmDel(type, ...args) {
  const [sid, tid, imgId] = args;
  let ttl = '', sub = '', action = '';
  if (type === 'subject') {
    const s = getS(sid);
    ttl = `Delete "${s.name}"?`;
    sub = `This will permanently delete the subject and all ${s.topics.reduce((a,t)=>a+t.images.length,0)} images inside it.`;
    action = `doDel('subject','${sid}')`;
  } else if (type === 'topic') {
    const t = getT(sid, tid);
    ttl = `Delete "${t.name}"?`;
    sub = `This will delete the topic and all ${t.images.length} images.`;
    action = `doDel('topic','${sid}','${tid}')`;
  } else {
    const t = getT(sid, tid);
    const img = t && t.images.find(i => i.id === imgId);
    ttl = `Delete "${img.name}"?`;
    sub = 'This cannot be undone.';
    action = `doDel('image','${sid}','${tid}','${imgId}')`;
  }
  openModal(`
    <div class="modal-title" style="color:var(--red)">${ttl}</div>
    <div class="modal-sub">${sub}</div>
    <div class="modal-acts">
      <button class="btn btn-ou" onclick="closeModal()">Cancel</button>
      <button class="btn btn-dk" onclick="${action}">Delete</button>
    </div>`);
}

function doDel(type, sid, tid, imgId) {
  if (type === 'subject') {
    data.subjects = data.subjects.filter(s => s.id !== sid);
    save(); closeModal();
    if (st.sid === sid) go('subjects');
    else render();
  } else if (type === 'topic') {
    const s = getS(sid); if (s) s.topics = s.topics.filter(t => t.id !== tid);
    save(); closeModal();
    if (st.tid === tid) go('topics', sid);
    else render();
  } else {
    const t = getT(sid, tid); if (t) t.images = t.images.filter(i => i.id !== imgId);
    save(); closeModal(); render();
  }
}

/* ── Keyboard shortcuts ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (!document.getElementById('lightbox').classList.contains('hidden'))
      document.getElementById('lightbox').classList.add('hidden');
    else closeModal();
  }
});

/* ── Init ── */
load();
render();
</script>
</body>
